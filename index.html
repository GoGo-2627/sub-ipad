                        <button onClick={handleLogout} className="flex items-center text-xs sm:text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-full transition-colors shadow-sm">
                        <Unlock size={14} className="mr-1" /> 登出 ({loginRole === 'admin' ? '系統管理員' : loginRole === 'office' ? '校務處' : '一般使用者'})
                        </button>
                    </div>
                    <h1 className="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">
                        <span className="block">觀塘官立小學(秀明道)</span>
                        <span className="block mt-1">平板電腦借用系統</span>
                    </h1>
                    <div className="sm:hidden flex justify-end mt-2 pr-2">
                        <button onClick={handleLogout} className="flex items-center text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-full transition-colors shadow-sm">
                        <Unlock size={12} className="mr-1" /> 登出 ({loginRole === 'admin' ? '系統管理員' : loginRole === 'office' ? '校務處' : '一般使用者'})
                        </button>
                    </div>
                </header>

                <div className="w-full max-w-full mx-auto mb-6 px-2 print-hide text-center">
                    <div className="inline-flex flex-row text-left bg-gray-200 rounded-lg p-1 gap-1 max-w-full overflow-x-auto scrollbar-hide snap-x">
                    {loginRole !== 'office' && (
                        <>
                        <button
                            onClick={() => setActiveTab('form')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'form' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <ClipboardList className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">借用表</span>
                            <span className="hidden sm:inline">填寫借用表</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('records')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'records' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <List className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">借用清單</span>
                            <span className="hidden sm:inline">借用紀錄清單</span>
                        </button>
                        </>
                    )}
                    <button
                        onClick={() => setActiveTab('schedule')}
                        className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'schedule' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                        }`}
                    >
                        <Calendar className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                        <span className="sm:hidden">總表(課室)</span>
                        <span className="hidden sm:inline">本週總表</span>
                    </button>
                    {(loginRole === 'admin' || loginRole === 'office') && (
                        <>
                        <button
                            onClick={() => setActiveTab('duty')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'duty' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <List className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">安排職務</span>
                            <span className="hidden sm:inline">安排職務(校務處)</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('office_schedule')}
                            className={`flex flex-none justify-center items-center px-3 py-3 sm:px-6 rounded-md font-bold text-sm sm:text-lg transition-all whitespace-nowrap snap-center ${activeTab === 'office_schedule' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-300'
                            }`}
                        >
                            <Calendar className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" />
                            <span className="sm:hidden">總表(校務處)</span>
                            <span className="hidden sm:inline">每週總表(校務處)</span>
                        </button>
                        </>
                    )}
                    </div>
                </div>

                {notification.show && (
                    <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg flex items-center animate-bounce print-hide ${notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'
                    }`}>
                    {notification.type === 'error' ? <AlertCircle className="mr-2" /> : <CheckCircle2 className="mr-2" />}
                    {notification.message}
                    </div>
                )}

                <div className="w-full max-w-full mx-auto px-1 sm:px-2 print:max-w-none print:w-full print:px-0">
                    {activeTab === 'form' && renderForm()}
                    {activeTab === 'records' && renderRecords()}
                    {activeTab === 'schedule' && renderSchedule('normal')}
                    {activeTab === 'duty' && renderSchedule('duty')}
                    {activeTab === 'office_schedule' && renderSchedule('office')}
                </div>
                </div>
            );
        }

        // 啟動 React 應用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
