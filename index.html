            .print-hide { display: none !important; }
            .print-overflow-visible { overflow: visible !important; }
            
            /* 分頁保護設定：確保「節數」為分割位，不夠時安排下一頁 */
            table { page-break-inside: auto !important; }
            tr { page-break-inside: avoid !important; break-inside: avoid !important; page-break-after: auto !important; }
            td, th { page-break-inside: avoid !important; break-inside: avoid !important; }
            thead { display: table-header-group !important; }
            tfoot { display: table-footer-group !important; }

            .schedule-table { min-width: 100% !important; width: 100% !important; table-layout: fixed !important; }

        // 初始化 Firebase
        const fallbackConfig = {

            messagingSenderId: "802295595519",
            appId: "1:802295595519:web:c878de718057524784a7ca",
            measurementId: "G-0VCP6P0HYS"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- Firebase 路徑輔助函數 (自動適應 Github Pages 或 本地環境) ---

        const getDocRef = (id) => isLocalDeploy ? doc(db, 'bookings', String(id)) : doc(db, 'artifacts', appId, 'public', 'data', 'bookings', String(id));

        // --- 常數設定 ---
        const DAYS = ['星期一', '星期二', '星期三', '星期四', '星期五'];
        const PERIODS = [
            { id: 1, name: '第1節', time: '8:35 - 9:10' },

            { id: 4, name: '第4節', time: '10:40 - 11:15' },
            { id: 'recess2', name: '小休', time: '11:15 - 11:25', isBreak: true },
            { id: 5, name: '第5節', time: '11:25 - 12:00' },
            { id: 6, name: '第6節', time: '12:00 - 12:35' },
            { id: 'lunch', name: '午膳', time: '12:35 - 1:15', isBreak: true },

        const BLACKOUT_PERIODS = {

            '星期三': { 8: '生教課', 9: '導修' },
            '星期四': { 9: '導修' },
            '星期五': { 7: '導修', 8: '課外活動', 9: '課外活動' },
        };

        // --- 設定特定不設借用的日期 (MM-DD 格式 - 保留兼容用) ---
        const BLACKOUT_DATES = {
            '05-25': '佛誕翌日',
            '06-04': '考試',
            '06-05': '考試',
            '06-08': '考試',
            '06-09': '考試',
            '06-19': '端午節',
            '06-26': '六年級畢業禮'
        };

        // --- 下拉選單資料 ---
        const TEACHERS = ["張", "何", "李", "潘", "黎", "譚", "樊", "文", "鄧", "羅", "梁", "黃", "蔡", "伍", "袁", "皓", "和", "輝", "麗", "周", "董", "龍", "榗", "秋", "桂", "靜", "麥", "欣", "卓", "儀", "詠", "艷", "芬", "鄺", "佳", "月", "瀅", "兆", "笑", "冼", "彥", "琳", "劉", "泉", "葉", "恩", "汪", "趙", "楚", "達", "豪", "蓮", "珊", "婉", "惠", "Rachel", "導師"];
        const CLASSES = ["1A", "1B", "1C", "1D", "1E", "2A", "2B", "2C", "2D", "2E", "3A", "3B", "3C", "3D", "3E", "4A", "4B", "4C", "4D", "4E", "5A", "5B", "5C", "5D", "5E", "6A", "6B", "6C", "6D", "6E"];
        const SUBJECTS = ["中文", "英文", "數學", "常識", "科學", "人文", "視藝", "音樂", "體育", "科技", "普話", "綜合課", "生教課", "課外活動"];
        const TAS = ["Angus", "Edmond", "Eunice", "Ken", "Kitty", "Lantis", "Matthew", "Stephanie", "Issac", "Ming", "科任老師"];
        const WORKERS = ["培", "娟", "紅", "安", "梅", "蘭"];

        // --- 日期與文字解析工具 ---
        const getLocalYYYYMMDD = (d) => {
            const z = n => ('0' + n).slice(-2);
            return `${d.getFullYear()}-${z(d.getMonth() + 1)}-${z(d.getDate())}`;
        };

        const parseDateObj = (str) => {
            const parts = str.split('/');
            if (parts.length === 3) {
                const d = parseInt(parts[0].trim(), 10);
                const m = parseInt(parts[1].trim(), 10) - 1;
                const y = parseInt(parts[2].trim(), 10);
                return new Date(y, m, d);
            }
            return null;
        };

        const parseDatesFromText = (text, type) => {
            if (!text) return type === 'holidays' ? {} : new Set();
            const lines = text.split('\n');
            const holidays = {};
            const halfDays = new Set();

            lines.forEach(line => {
                if (!line || line.includes('特別活動及假期') || line.includes('半日上課') || line.trim() === '') return;

                const match = line.match(/^([\d\s\/\-]+)(.*)$/);
                if (match) {
                    const datePart = match[1].trim();
                    const reason = match[2].trim() || (type === 'holidays' ? '特別假期' : '');

                    if (datePart.includes('-')) {
                        const [startStr, endStr] = datePart.split('-').map(s => s.trim());
                        const startD = parseDateObj(startStr);
                        const endD = parseDateObj(endStr);
                        if (startD && endD) {
                            let curr = new Date(startD);
                            const end = new Date(endD);
                            let safety = 0;
                            while (curr <= end && safety < 1000) {
                                const ymd = getLocalYYYYMMDD(curr);
                                if (type === 'holidays') holidays[ymd] = reason;
                                if (type === 'halfDays') halfDays.add(ymd);
                                curr.setDate(curr.getDate() + 1);
                                safety++;
                            }
                        }
                    } else {
                        const d = parseDateObj(datePart);
                        if (d) {
                            const ymd = getLocalYYYYMMDD(d);
                            if (type === 'holidays') holidays[ymd] = reason;
                            if (type === 'halfDays') halfDays.add(ymd);
                        }
                    }
                }
            });
            return type === 'holidays' ? holidays : halfDays;
        };

        // 自動排序與對齊排版工具
        const formatAndSortDateText = (text) => {
            if (!text) return "";
            const lines = text.split('\n');
            const headers = [];
            const dateItems = [];

            lines.forEach(line => {
                if (line.trim() === '') return;
                const match = line.match(/^([\d\s\/\-]+)(.*)$/);
                // 判斷是否為有效日期格式 (例如: DD/MM/YYYY)
                if (match && /\d{1,2}\/\d{1,2}(\/\d{2,4})?/.test(match[1])) {
                    let datePart = match[1].trim();
                    datePart = datePart.replace(/\s*-\s*/g, ' - ');
                    const reasonPart = match[2].trim();
                    
                    let startStr = datePart.includes('-') ? datePart.split('-')[0].trim() : datePart;
                    const dObj = parseDateObj(startStr);
                    const sortTime = dObj ? dObj.getTime() : Number.MAX_SAFE_INTEGER;
                    
                    dateItems.push({ datePart, reasonPart, sortTime });
                } else {
                    headers.push(line.trim());
                }
            });

            // 以日期先後排序
            dateItems.sort((a, b) => a.sortTime - b.sortTime);

            // 計算最長日期的字元長度，以利統一對齊名稱
            let maxDateLen = 0;
            dateItems.forEach(item => {
                if (item.datePart.length > maxDateLen) maxDateLen = item.datePart.length;
            });
            const paddingSpaces = 4; // 預留至少 4 個半形空白作間距

            const formattedDateLines = dateItems.map(item => {
                if (!item.reasonPart) return item.datePart;
                const spaces = " ".repeat(maxDateLen - item.datePart.length + paddingSpaces);
                return `${item.datePart}${spaces}${item.reasonPart}`;
            });

            return [...headers, ...formattedDateLines].join('\n');
        };

        const getPrintDateString = () => {
            const d = new Date();
            const z = n => ('0' + n).slice(-2);
            return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`; 
        };

        const getISOWeek = (date) => {
            const termStart = new Date(2026, 1, 2); 
            const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const diffTime = target - termStart;
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            return Math.floor(diffDays / 7) + 1;
        };

        const generateCurrentWeekMsg = (dateStr) => {
            const d = new Date(dateStr || new Date());
            const dayNum = d.getDay() || 7;
            const monday = new Date(d);
            monday.setDate(d.getDate() - dayNum + 1);
            const friday = new Date(monday);
            friday.setDate(monday.getDate() + 4);
            return `第${getISOWeek(monday)}週: ${monday.getMonth() + 1}月${monday.getDate()}日 至 ${friday.getMonth() + 1}月${friday.getDate()}日`;
        };

        const isPastThursdayCutoff = () => {
            const now = new Date();
            const day = now.getDay() || 7; 
            const hour = now.getHours();
            return (day > 4) || (day === 4 && hour >= 16);
        };

        const isPastFridayCutoff = () => {
            const now = new Date();
            const day = now.getDay() || 7;
            const hour = now.getHours();
            return (day > 5) || (day === 5 && hour >= 16);
        };

        const generateBookingRangeMsg = () => {
            const baseDate = new Date();
            const isCutoff = isPastThursdayCutoff();
            if (isCutoff) {
                baseDate.setDate(baseDate.getDate() + 7);
            }
            const dayOfWeek = baseDate.getDay() || 7;
            const targetNextMonday = new Date(baseDate);
            targetNextMonday.setDate(baseDate.getDate() - dayOfWeek + 8);
            const nextFriday = new Date(targetNextMonday);
            nextFriday.setDate(targetNextMonday.getDate() + 4);
            const weekAfterNextMonday = new Date(targetNextMonday);
            weekAfterNextMonday.setDate(targetNextMonday.getDate() + 7);
            const weekAfterNextFriday = new Date(weekAfterNextMonday);
            weekAfterNextFriday.setDate(weekAfterNextMonday.getDate() + 4);
            const formatRange = (start, end) => {
                return `${start.getMonth() + 1}月${start.getDate()}日 至 ${end.getMonth() + 1}月${end.getDate()}日`;
            };

            return (
                <div className="flex flex-col sm:flex-row sm:items-center sm:text-left">
                <span className="whitespace-nowrap sm:mr-1 font-bold text-[#800000] mb-1 sm:mb-0">可預約週次:</span>
                {isCutoff ? (
                    <>
                    <div className="flex flex-col sm:hidden">
                        <span>第{getISOWeek(targetNextMonday)}週: {formatRange(targetNextMonday, nextFriday)}</span>
                        <span>第{getISOWeek(weekAfterNextMonday)}週: {formatRange(weekAfterNextMonday, weekAfterNextFriday)}</span>
                        <span className="text-red-600 font-bold text-xs mt-1">(逢星期四下午4時後將暫停下週預約)</span>
                    </div>
                    <div className="hidden sm:flex items-center flex-wrap">
                        <span>第{getISOWeek(targetNextMonday)}週: {formatRange(targetNextMonday, nextFriday)} 及 第{getISOWeek(weekAfterNextMonday)}週: {formatRange(weekAfterNextMonday, weekAfterNextFriday)}</span>
                        <span className="text-red-600 font-bold sm:ml-2">(逢星期四下午4時後將暫停下週預約)</span>
                    </div>
                    </>
                ) : (
                    <>
                    <div className="flex flex-col sm:hidden">
                        <span>第{getISOWeek(targetNextMonday)}週: {formatRange(targetNextMonday, nextFriday)}</span>
                        <span>第{getISOWeek(weekAfterNextMonday)}週: {formatRange(weekAfterNextMonday, weekAfterNextFriday)}</span>
                    </div>
                    <div className="hidden sm:flex items-center">
                        <span>第{getISOWeek(targetNextMonday)}週: {formatRange(targetNextMonday, nextFriday)} 及 第{getISOWeek(weekAfterNextMonday)}週: {formatRange(weekAfterNextMonday, weekAfterNextFriday)}</span>
                    </div>
                    </>
                )}
                </div>
            );
        };

        const getBaseMonday = () => {
            const d = new Date();
            if (isPastFridayCutoff()) {
                const day = d.getDay() || 7;
                d.setDate(d.getDate() + (8 - day));
            }
            const currentDay = d.getDay() || 7;
            d.setDate(d.getDate() - currentDay + 1);
            return d;
        };
        const initMonday = getBaseMonday();

        const getDateStrFromMonday = (daysToAdd) => {
            const d = new Date(initMonday);
            d.setDate(initMonday.getDate() + daysToAdd);
            return getLocalYYYYMMDD(d);
        };

        const getUserDefaultDate = () => {
            const d = new Date();
            const day = d.getDay() || 7;
            d.setDate(d.getDate() - day + 8); 
            if (isPastThursdayCutoff()) {
                d.setDate(d.getDate() + 7);
            }
            return getLocalYYYYMMDD(d);
        };

        const getAdminDefaultDate = () => {
            return getLocalYYYYMMDD(new Date()); 
        };

            // 特別活動及半日上課自訂設定狀態（載入時會自動以預設格式化進行整理）

            const defaultDateStr = getUserDefaultDate();

            const defaultDayIdx = defaultDateObj.getDay();
            const defaultFormDay = (defaultDayIdx === 0 || defaultDayIdx === 6) ? '週末及週日(不可借用)' : DAYS[defaultDayIdx - 1];

            const defaultViewDateStr = (() => {
                if (isPastFridayCutoff()) return getDateStrFromMonday(0);

            const [viewDate, setViewDate] = useState(defaultViewDateStr);
            
            const [loginPassword, setLoginPassword] = useState('');
            const [visibleCarts, setVisibleCarts] = useState(['1號車', '2號車', '3號車']);
            const [customNotes, setCustomNotes] = useState({});

            const [formData, setFormData] = useState({
                date: defaultDateStr,
                day: defaultFormDay,
                periods: [],
                className: '',
                subject: '',
                teacher: '',
                qty: 35,
                ta: '',
                cart: '' 
            });

            const stringToHex = (str) => {
                return Array.from(str || '').map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
            };

            // 監聽並解析文字方塊的日期
            useEffect(() => {
                setParsedHolidays(parseDatesFromText(holidaysText, 'holidays'));
                setParsedHalfDays(parseDatesFromText(halfDaysText, 'halfDays'));
            }, [holidaysText, halfDaysText]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenError) {
                                console.warn("Token 不匹配，改用匿名登入:", tokenError);
                                await signInAnonymously(auth);

                        } else {
                            await signInAnonymously(auth);

                        console.error("驗證失敗:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribeBookings = onSnapshot(getCollRef(), (snapshot) => {
                    const cloudData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    const normalBookings = cloudData.filter(doc => !String(doc.id).startsWith('week_status_') && String(doc.id) !== 'system_settings_calendar');
                    const statuses = {};
                    const workerStatuses = {};
                    const halfDaysObj = {};
                    cloudData.filter(doc => String(doc.id).startsWith('week_status_')).forEach(doc => {
                        const mondayStr = String(doc.id).replace('week_status_', '');
                        statuses[mondayStr] = doc.isArranged;
                        workerStatuses[mondayStr] = doc.isWorkerArranged;
                        halfDaysObj[mondayStr] = doc.halfDays || {};
                    });
                    
                    const settingsDoc = cloudData.find(d => d.id === 'system_settings_calendar');
                    if (settingsDoc) {
                        if (settingsDoc.holidaysText !== undefined) setHolidaysText(formatAndSortDateText(settingsDoc.holidaysText));
                        if (settingsDoc.halfDaysText !== undefined) setHalfDaysText(formatAndSortDateText(settingsDoc.halfDaysText));
                        if (settingsDoc.workerStatsStartDate !== undefined) setWorkerStatsStartDate(settingsDoc.workerStatsStartDate);
                        else if (settingsDoc.statsStartDate !== undefined) setWorkerStatsStartDate(settingsDoc.statsStartDate);
                        if (settingsDoc.taStatsStartDate !== undefined) setTaStatsStartDate(settingsDoc.taStatsStartDate);
                        else if (settingsDoc.statsStartDate !== undefined) setTaStatsStartDate(settingsDoc.statsStartDate);
                    }

                    setDbBookings(normalBookings);
                    setWeekStatuses(statuses);
                    setWeekWorkerStatuses(workerStatuses);
                    setWeekHalfDays(halfDaysObj);
                }, (error) => {
                    console.error("讀取資料失敗:", error);
                });

                return () => {
                    unsubscribeBookings();
                };
            }, [user]);

            const checkIsHalfDay = (mondayStr, dateStr) => {
                return (weekHalfDays[mondayStr] && weekHalfDays[mondayStr][dateStr]) || parsedHalfDays.has(dateStr);
            };

            const saveCalendarSettings = async (type, newText) => {
                try {
                    const ref = getDocRef('system_settings_calendar');
                    if (type === 'holidays') {
                        await setDoc(ref, { holidaysText: newText }, { merge: true });
                    } else {
                        await setDoc(ref, { halfDaysText: newText }, { merge: true });
                    }
                    showNotification('設定已成功儲存並完成排版！', 'success');
                } catch (error) {
                    console.error("儲存失敗:", error);
                    showNotification(`儲存失敗: ${error.message}`, 'error');
                }
            };

            const showNotification = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: '' }), 5000); 
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                if (name === 'date') {
                    const d = new Date(value);
                    const dayIdx = d.getDay();
                    let newDay = '週末及週日(不可借用)';
                    if (dayIdx >= 1 && dayIdx <= 5) newDay = DAYS[dayIdx - 1];
                    setFormData(prev => ({ ...prev, date: value, day: newDay }));
                } else {
                    setFormData(prev => {
                        const newData = { ...prev, [name]: value };
                        if ((name === 'className' || name === 'subject') && /^[2-6]/.test(newData.className) && newData.subject?.includes('科技')) {
                            newData.ta = '';
                        }
                        return newData;
                    });
                }
            };

            const handlePeriodToggle = (periodId) => {
                setFormData(prev => {
                    const periods = prev.periods.includes(periodId)
                        ? prev.periods.filter(p => p !== periodId)
                        : [...prev.periods, periodId].sort((a, b) => a - b);
                    return { ...prev, periods };
                });
            };

            const planAssignments = (date, day, periods, subject, className) => {
                const dateSuffix = date.substring(5);
                const blackoutReason = parsedHolidays[date] || BLACKOUT_DATES[dateSuffix];
                if (blackoutReason) {
                    return { success: false, message: `選擇的日期為 ${blackoutReason}，暫停借用。` };
                }

                const isGrade2To6Tech = /^[2-6]/.test(className) && subject.includes('科技');
                let assignments = {};

                const getAvailableCarts = (pid) => {
                    if (!isAdmin && BLACKOUT_PERIODS[day] && BLACKOUT_PERIODS[day][pid]) return [];
                    const currentBookings = bookings.filter(b =>
                        !b.isSystem &&
                        b.period === pid &&
                        (b.date === date || (b.isRecurring && b.day === day))
                    );
                    const usedCarts = currentBookings.map(b => b.cart);
                    const avail = [];
                    if (!usedCarts.includes('1號車')) avail.push('1號車');
                    if (!usedCarts.includes('2號車')) avail.push('2號車');
                    if (isAdmin && !usedCarts.includes('3號車')) avail.push('3號車');
                    return avail;
                };

                if (isGrade2To6Tech) {
                    for (let pid of periods) {
                        if (!isAdmin && BLACKOUT_PERIODS[day] && BLACKOUT_PERIODS[day][pid]) {
                            return { success: false, message: `第${pid}節為 ${BLACKOUT_PERIODS[day][pid]}，暫停借用。` };
                        }
                        const currentBookings = bookings.filter(b => !b.isSystem && b.period === pid && (b.date === date || (b.isRecurring && b.day === day)));
                        if (currentBookings.some(b => b.cart === '3號車')) {
                            return { success: false, message: `第${pid}節的 3號車 已被借用。` };
                        }
                        assignments[pid] = '3號車';
                    }
                    return { success: true, assignments };
                }

                const sortedPeriods = [...periods].sort((a, b) => a - b);
                const blocks = [];
                let currentBlock = [];
                const allPeriods = PERIODS.filter(p => !p.isBreak).map(p => p.id);

                for (let i = 0; i < sortedPeriods.length; i++) {
                    if (currentBlock.length === 0) {
                        currentBlock.push(sortedPeriods[i]);
                    } else {
                        const lastPeriod = currentBlock[currentBlock.length - 1];
                        const lastIdx = allPeriods.indexOf(lastPeriod);
                        const currentIdx = allPeriods.indexOf(sortedPeriods[i]);
                        if (currentIdx === lastIdx + 1) {
                            currentBlock.push(sortedPeriods[i]);
                        } else {
                            blocks.push(currentBlock);
                            currentBlock = [sortedPeriods[i]];
                        }
                    }
                }
                if (currentBlock.length > 0) {
                    blocks.push(currentBlock);
                }

                let totalRearrangements = [];
                const existingClassBookings = bookings.filter(b => 
                    !b.isSystem && 
                    b.className === className && 
                    (b.date === date || (b.isRecurring && b.day === day))
                );

                for (let block of blocks) {
                    const firstPeriod = block[0];
                    const lastPeriod = block[block.length - 1];
                    const idxFirst = allPeriods.indexOf(firstPeriod);
                    const idxLast = allPeriods.indexOf(lastPeriod);
                    
                    let forcedTargetCart = null;
                    const adjacentPeriodsToCheck = [];
                    if (idxFirst > 0) adjacentPeriodsToCheck.push(allPeriods[idxFirst - 1]);
                    if (idxLast !== -1 && idxLast < allPeriods.length - 1) adjacentPeriodsToCheck.push(allPeriods[idxLast + 1]);

                    for (let adjPid of adjacentPeriodsToCheck) {
                        const adjBooking = existingClassBookings.find(b => b.period === adjPid);
                        const trackableCarts = isAdmin ? ['1號車', '2號車', '3號車'] : ['1號車', '2號車'];
                        if (adjBooking && trackableCarts.includes(adjBooking.cart)) {
                            forcedTargetCart = adjBooking.cart;
                            break;
                        }
                    }

                    if (forcedTargetCart) {
                        let canArrangeForced = true;
                        let tempRearrangements = [];
                        
                        for (let pid of block) {
                            const avail = getAvailableCarts(pid);
                            if (avail.includes(forcedTargetCart)) continue; 
                            
                            if (avail.length === 0) {
                                canArrangeForced = false; 
                                break;
                            }
                            
                            const conflictBooking = bookings.find(b =>
                                !b.isSystem && b.period === pid && b.cart === forcedTargetCart &&
                                (b.date === date || (b.isRecurring && b.day === day))
                            );

                            if (conflictBooking && !conflictBooking.isSystem) {
                                tempRearrangements.push({ booking: conflictBooking, newCart: avail[0] });
                            } else {
                                canArrangeForced = false;
                                break;
                            }
                        }
                        
                        if (canArrangeForced) {
                            for (let pid of block) assignments[pid] = forcedTargetCart;
                            totalRearrangements.push(...tempRearrangements);
                            continue; 
                        } else {
                            return { success: false, message: `系統偵測到同班相鄰課堂有借用(${forcedTargetCart})，但無法為您排入該車號（可能因車位已滿或有固定課堂），請嘗試其他時段或分開借用。` };
                        }
                    }

                    if (block.length > 1) { 
                        let commonAvail = getAvailableCarts(block[0]);
                        for (let i = 1; i < block.length; i++) {
                            const availNext = getAvailableCarts(block[i]);
                            commonAvail = commonAvail.filter(c => availNext.includes(c));
                        }

                        if (commonAvail.length > 0) {
                            for (let pid of block) assignments[pid] = commonAvail[0];
                        } else {
                            let rearranged = false;
                            const possibleCarts = isAdmin ? ['1號車', '2號車', '3號車'] : ['1號車', '2號車'];

                            for (let targetCart of possibleCarts) {
                                let canRearrange = true;
                                let tempRearrangements = [];

                                for (let pid of block) {
                                    const avail = getAvailableCarts(pid);
                                    if (avail.includes(targetCart)) continue;

                                    if (avail.length === 0) {
                                        canRearrange = false;
                                        break;
                                    }

                                    const conflictBooking = bookings.find(b =>
                                        !b.isSystem && b.period === pid && b.cart === targetCart &&
                                        (b.date === date || (b.isRecurring && b.day === day))
                                    );

                                    if (conflictBooking && !conflictBooking.isSystem) {
                                        tempRearrangements.push({ booking: conflictBooking, newCart: avail[0] });
                                    } else {
                                        canRearrange = false;
                                        break;
                                    }
                                }

                                if (canRearrange) {
                                    rearranged = true;
                                    for (let pid of block) assignments[pid] = targetCart;
                                    totalRearrangements.push(...tempRearrangements);
                                    break;
                                }
                            }

                            if (!rearranged) {
                                return { success: false, message: `無法為連堂 (第${block.join(',')}節) 安排同一部車輛，且無法自動調節，請嘗試其他時段或分開單獨預約。` };
                            }
                        }
                    } else { 
                        const pid = block[0];
                        const avail = getAvailableCarts(pid);
                        if (avail.length === 0) return { success: false, message: `第${pid}節的 1號及2號車 均已被借出。` };
                        assignments[pid] = avail[0];
                    }
                }

                return { success: true, assignments, rearrangements: totalRearrangements };
            };

            const executeBooking = async (data, plan) => {
                try {
                    if (plan.rearrangements && plan.rearrangements.length > 0) {
                        await Promise.all(plan.rearrangements.map(r =>

                };

            const calculateWorkerStatistics = () => {

                while (currentIterDate <= endDate) {
                    const dayIdx = currentIterDate.getDay();

                        const dateStr = getLocalYYYYMMDD(currentIterDate);
                        const dateSuffix = dateStr.substring(5);
                        const dayName = DAYS[dayIdx - 1];
                        const isBlackout = parsedHolidays[dateStr] || BLACKOUT_DATES[dateSuffix];

                        if (!isBlackout) {
                            const dayBookings = bookings.filter(b =>

                                (b.date === dateStr || (b.isRecurring && b.day === dayName))

                            }));

                                const jobsList = [];
                                cartBookings.sort((a, b) => a.period - b.period);

                                cartBookings.forEach(b => {
                                    const pIdx = allPeriods.findIndex(p => p.id === b.period);
                                    if (!currentJob) {
                                        currentJob = { ...b, startPeriod: b.period, endPeriod: b.period };
                                        jobsList.push(currentJob);
                                    } else {
                                        const prevIdx = allPeriods.findIndex(p => p.id === currentJob.endPeriod);
                                        if (pIdx === prevIdx + 1 && b.className === currentJob.className && b.workerCode === currentJob.workerCode && b.cart === currentJob.cart) {
                                            currentJob.endPeriod = b.period;
                                        } else {
                                            currentJob = { ...b, startPeriod: b.period, endPeriod: b.period };
                                            jobsList.push(currentJob);
                                        }
                                    }
                                });
                                return jobsList;
                            };

                            const cart3Jobs = processCartJobs(dayBookings.filter(b => b.cart === '3號車' && !b.subject?.includes('科技')));

                            const allJobsForDay = [...cart1Jobs, ...cart2Jobs, ...cart3Jobs];
                            
                            allJobsForDay.forEach(job => {
                                if (job.workerCode && stats[job.workerCode] !== undefined) {

            const handleExportOfficeExcel = async () => {
                if (typeof ExcelJS === 'undefined') {
                    showNotification('Excel 匯出庫尚未載入，請稍後再試', 'error');
                    return;
                }
                const weekDates = getWeekDates(viewDate);
                const currentMondayStr = weekDates[0].dateStr;
                const d = new Date();
                const printDateFormatted = `列印日期: ${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
                const weekNum = getISOWeek(new Date(weekDates[0].dateStr));
                
                const titleText = `每週平板電腦運送安排總表 (${generateCurrentWeekMsg(viewDate)})`;

                const allPeriods = PERIODS.filter(p => !p.isBreak);
                const daysJobs = weekDates.map(wd => {
                    const dateSuffix = wd.dateStr.substring(5);
                    const isBlackout = parsedHolidays[wd.dateStr] || BLACKOUT_DATES[dateSuffix];

                    const dayBookings = isBlackout ? [] : bookings.filter(b => 
                        !b.isSystem && 
                        (b.date === wd.dateStr || (b.isRecurring && b.day === wd.name))
                    ).map(b => ({
                        ...b,
                        workerCode: b.isRecurring ? (b.workerOverrides?.[wd.dateStr] || '') : (b.workerCode || '')
                    }));

                    const cart1Raw = dayBookings.filter(b => b.cart === '1號車');
                    const cart2Raw = dayBookings.filter(b => b.cart === '2號車');
                    const cart3Raw = dayBookings.filter(b => b.cart === '3號車' && !b.subject?.includes('科技'));

                    const processCartJobs = (cartBookings) => {
                        const jobsList = [];
                        cartBookings.sort((a, b) => a.period - b.period);
                        let currentJob = null;
                        cartBookings.forEach(b => {
                            const pIdx = allPeriods.findIndex(p => p.id === b.period);
                            if (!currentJob) {
                                currentJob = { ...b, startPeriod: b.period, endPeriod: b.period };
                                jobsList.push(currentJob);
                            } else {
                                const prevIdx = allPeriods.findIndex(p => p.id === currentJob.endPeriod);
                                if (pIdx === prevIdx + 1 && b.className === currentJob.className && b.workerCode === currentJob.workerCode && b.cart === currentJob.cart) {
                                    currentJob.endPeriod = b.period;
                                } else {
                                    currentJob = { ...b, startPeriod: b.period, endPeriod: b.period };
                                    jobsList.push(currentJob);
                                }
                            }
                        });
                        return jobsList;
                    };

                    const cart1Jobs = processCartJobs(cart1Raw);
                    const cart2Jobs = processCartJobs(cart2Raw);
                    const cart3Jobs = processCartJobs(cart3Raw);

                    const cart2_3Jobs = [...cart2Jobs, ...cart3Jobs].sort((a, b) => a.startPeriod - b.startPeriod);

                    const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);
                    const processTimes = (jobs) => {
                        jobs.forEach(job => {
                            const getStart = (pid) => {
                                const timeStr = isHalfDay ? (HALF_DAY_TIMES[pid] || PERIODS.find(p => p.id === pid).time) : PERIODS.find(p => p.id === pid).time;
                                return timeStr.split('-')[0].trim();
                            };
                            const getEnd = (pid) => {
                                const timeStr = isHalfDay ? (HALF_DAY_TIMES[pid] || PERIODS.find(p => p.id === pid).time) : PERIODS.find(p => p.id === pid).time;
                                return timeStr.split('-')[1].trim();
                            };
                            job.startTime = getStart(job.startPeriod);
                            job.endTime = getEnd(job.endPeriod);
                            job.shortCart = job.cart.replace('號車', '車');
                        });
                    };

                    processTimes(cart1Jobs);
                    processTimes(cart2_3Jobs);

                    const dayRows = [];
                    const maxLen = Math.max(cart1Jobs.length, cart2_3Jobs.length);
                    for(let i = 0; i < maxLen; i++) {
                        dayRows.push({
                            c1Job: cart1Jobs[i] || null,
                            c2Job: cart2_3Jobs[i] || null
                        });
                    }

                    return dayRows;
                });

                const maxRows = Math.max(...daysJobs.map(d => d.length), 1);

                const wb = new ExcelJS.Workbook();
                const ws = wb.addWorksheet('職工推車安排', {
                    pageSetup: {
                        paperSize: 9, 
                        orientation: 'landscape', 
                        margins: { left: 0.2, right: 0.2, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2 },
                        fitToPage: true,
                        fitToWidth: 1,
                        fitToHeight: 0,
                        horizontalCentered: true
                    }
                });

                const colWidths = [];
                for (let i = 0; i < 5; i++) {
                    colWidths.push(10); 
                    colWidths.push(4.2); 
                    colWidths.push(10); 
                    colWidths.push(4.2); 
                }
                ws.columns = colWidths.map(w => ({ width: w }));

                const r1 = ws.addRow([]);
                r1.height = 30;
                ws.mergeCells('A1:P1'); 
                const titleCell = ws.getCell('A1');
                titleCell.value = titleText;
                titleCell.font = { size: 18, bold: true, name: 'Microsoft JhengHei' };
                titleCell.alignment = { horizontal: 'center', vertical: 'middle' };

                ws.mergeCells('Q1:T1'); 
                const dateCell = ws.getCell('Q1');
                dateCell.value = printDateFormatted;
                dateCell.font = { size: 10, name: 'Microsoft JhengHei' };
                dateCell.alignment = { horizontal: 'right', vertical: 'bottom' };

                const r2 = ws.addRow([]);
                r2.height = 25;
                for (let i = 0; i < 5; i++) {
                    const startCol = i * 4 + 1; 
                    const endCol = startCol + 3;
                    const mergeStr = `${ws.getColumn(startCol).letter}2:${ws.getColumn(endCol).letter}2`;
                    ws.mergeCells(mergeStr);
                    
                    const cell = ws.getCell(`${ws.getColumn(startCol).letter}2`);
                    const wd = weekDates[i];
                    const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);
                    cell.value = `${wd.display}(${wd.name})${isHalfDay ? ' (半日)' : ''}`;
                    cell.font = { size: 12, bold: true, name: 'Microsoft JhengHei' };
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    
                    for (let c = startCol; c <= endCol; c++) {
                        const cCell = ws.getCell(2, c);
                        cCell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    }
                }

                const applyBlockBorder = (rowStart, colStart, isRightBlock) => {
                    for (let r = rowStart; r < rowStart + 4; r++) {
                        for (let c = colStart; c < colStart + 2; c++) {
                            const cell = ws.getCell(r, c);
                            if (isRightBlock) {
                                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFDE7' } };
                            }
                            const border = {};
                            if (r === rowStart) border.top = { style: 'thin' };
                            if (r === rowStart + 3) border.bottom = { style: 'thin' };
                            if (c === colStart) border.left = { style: 'thin' };
                            if (c === colStart + 1) border.right = { style: 'thin' };
                            cell.border = border;
                        }
                    }
                };

                let currentRow = 3;
                for (let r = 0; r < maxRows; r++) {
                    const row1 = ws.addRow([]); row1.height = 18;
                    const row2 = ws.addRow([]); row2.height = 16;
                    const row3 = ws.addRow([]); row3.height = 16;
                    const row4 = ws.addRow([]); row4.height = 22;

                    for (let d = 0; d < 5; d++) {
                        const dayJobs = daysJobs[d][r] || { c1Job: null, c2Job: null };
                        const baseCol = d * 4 + 1;

                        applyBlockBorder(currentRow, baseCol, false);
                        if (dayJobs.c1Job) {
                            const job = dayJobs.c1Job;
                            ws.getCell(currentRow, baseCol).value = job.className;
                            ws.getCell(currentRow, baseCol).font = { size: 14, bold: true, name: 'Arial' };
                            ws.getCell(currentRow, baseCol).alignment = { horizontal: 'left', vertical: 'middle' };
                            
                            ws.getCell(currentRow, baseCol + 1).value = job.shortCart;
                            ws.getCell(currentRow, baseCol + 1).font = { size: 12, bold: true, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow, baseCol + 1).alignment = { horizontal: 'right', vertical: 'middle' };

                            ws.getCell(currentRow + 1, baseCol).value = job.startTime;
                            ws.getCell(currentRow + 1, baseCol).font = { size: 11, name: 'Arial' };
                            ws.getCell(currentRow + 1, baseCol).alignment = { horizontal: 'left', vertical: 'middle' };
                            
                            ws.getCell(currentRow + 1, baseCol + 1).value = '送';
                            ws.getCell(currentRow + 1, baseCol + 1).font = { size: 11, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow + 1, baseCol + 1).alignment = { horizontal: 'right', vertical: 'middle' };

                            ws.getCell(currentRow + 2, baseCol).value = job.endTime;
                            ws.getCell(currentRow + 2, baseCol).font = { size: 11, name: 'Arial' };
                            ws.getCell(currentRow + 2, baseCol).alignment = { horizontal: 'left', vertical: 'middle' };
                            
                            ws.getCell(currentRow + 2, baseCol + 1).value = '收';
                            ws.getCell(currentRow + 2, baseCol + 1).font = { size: 11, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow + 2, baseCol + 1).alignment = { horizontal: 'right', vertical: 'middle' };

                            ws.mergeCells(currentRow + 3, baseCol, currentRow + 3, baseCol + 1);
                            ws.getCell(currentRow + 3, baseCol).value = job.workerCode || '';
                            ws.getCell(currentRow + 3, baseCol).font = { size: 18, bold: true, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow + 3, baseCol).alignment = { horizontal: 'center', vertical: 'middle' };
                        } else {
                            ws.mergeCells(currentRow + 3, baseCol, currentRow + 3, baseCol + 1); 
                        }

                        applyBlockBorder(currentRow, baseCol + 2, true);
                        if (dayJobs.c2Job) {
                            const job = dayJobs.c2Job;
                            ws.getCell(currentRow, baseCol + 2).value = job.className;
                            ws.getCell(currentRow, baseCol + 2).font = { size: 14, bold: true, name: 'Arial' };
                            ws.getCell(currentRow, baseCol + 2).alignment = { horizontal: 'left', vertical: 'middle' };
                            
                            ws.getCell(currentRow, baseCol + 3).value = job.shortCart;
                            ws.getCell(currentRow, baseCol + 3).font = { size: 12, bold: true, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow, baseCol + 3).alignment = { horizontal: 'right', vertical: 'middle' };

                            ws.getCell(currentRow + 1, baseCol + 2).value = job.startTime;
                            ws.getCell(currentRow + 1, baseCol + 2).font = { size: 11, name: 'Arial' };
                            ws.getCell(currentRow + 1, baseCol + 2).alignment = { horizontal: 'left', vertical: 'middle' };
                            
                            ws.getCell(currentRow + 1, baseCol + 3).value = '送';
                            ws.getCell(currentRow + 1, baseCol + 3).font = { size: 11, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow + 1, baseCol + 3).alignment = { horizontal: 'right', vertical: 'middle' };

                            ws.getCell(currentRow + 2, baseCol + 2).value = job.endTime;
                            ws.getCell(currentRow + 2, baseCol + 2).font = { size: 11, name: 'Arial' };
                            ws.getCell(currentRow + 2, baseCol + 2).alignment = { horizontal: 'left', vertical: 'middle' };
                            
                            ws.getCell(currentRow + 2, baseCol + 3).value = '收';
                            ws.getCell(currentRow + 2, baseCol + 3).font = { size: 11, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow + 2, baseCol + 3).alignment = { horizontal: 'right', vertical: 'middle' };

                            ws.mergeCells(currentRow + 3, baseCol + 2, currentRow + 3, baseCol + 3);
                            ws.getCell(currentRow + 3, baseCol + 2).value = job.workerCode || '';
                            ws.getCell(currentRow + 3, baseCol + 2).font = { size: 18, bold: true, name: 'Microsoft JhengHei' };
                            ws.getCell(currentRow + 3, baseCol + 2).alignment = { horizontal: 'center', vertical: 'middle' };
                        } else {
                            ws.mergeCells(currentRow + 3, baseCol + 2, currentRow + 3, baseCol + 3);
                        }
                    }
                    currentRow += 4;
                }

                const buffer = await wb.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `平板電腦職工推車安排-第${weekNum}週_${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日.xlsx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showNotification('Excel 導出成功！');
            };

                                .catch((error) => showNotification(`解除確認失敗：${error.message}`, 'error'));
                        }
                    }
                    setUnlockTargetId(null);
                    setAdminPassword('');
                } else {
                    showNotification('密碼錯誤！', 'error');
                }
            };

            const renderUnlockModal = () => {
                if (!unlockTargetId) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 print-hide">

                            <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center justify-center">
                                <Lock className="mr-2 text-red-600" /> 需要管理員權限
                            </h3>
                            <p className="text-sm text-gray-600 mb-4 text-center">請輸入管理員密碼以解除確認狀態。</p>
                            <input
                                type="password"
                                value={adminPassword}
                                onChange={e => setAdminPassword(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && verifyUnlockPassword()}
                                className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4 text-center text-lg tracking-widest"
                                placeholder="輸入密碼"
                                autoFocus
                            />
                            <div className="flex space-x-3">
                                <button onClick={() => { setUnlockTargetId(null); setAdminPassword(''); }} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                <button onClick={verifyUnlockPassword} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors">確認解鎖</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const saveEditBooking = async (e) => {
                e.preventDefault();
                try {
                    await setDoc(getDocRef(String(editTargetBooking.id)), editTargetBooking, { merge: true });
                    
                    // --- 連堂自動同步 TA 邏輯 ---
                    const allPeriods = PERIODS.filter(p => !p.isBreak).map(p => p.id);
                    const startIndex = allPeriods.indexOf(editTargetBooking.period);
                    if (startIndex !== -1) {
                        const subsequentBookings = [];
                        let currentIndex = startIndex + 1;
                        while (currentIndex < allPeriods.length) {
                            const nextPeriod = allPeriods[currentIndex];
                            const nextBooking = bookings.find(b => 
                                !b.isSystem && b.period === nextPeriod && 
                                b.className === editTargetBooking.className && b.cart === editTargetBooking.cart &&
                                ((editTargetBooking.isRecurring && b.isRecurring && b.day === editTargetBooking.day) || 
                                 (!editTargetBooking.isRecurring && !b.isRecurring && b.date === editTargetBooking.date))
                            );
                            if (nextBooking) {
                                subsequentBookings.push(nextBooking);
                                currentIndex++;
                            } else {
                                break;
                            }
                        }
                        
                        if (subsequentBookings.length > 0) {
                            const promises = subsequentBookings.map(sb => 
                                setDoc(getDocRef(String(sb.id)), { ...sb, ta: editTargetBooking.ta }, { merge: true })
                            );
                            await Promise.all(promises);
                            showNotification('已成功更新預約資料！(已自動同步TA至連堂課節)', 'success');
                            setEditTargetBooking(null);
                            return;
                        }
                    }

                    showNotification('已成功更新預約資料！', 'success');
                    setEditTargetBooking(null);
                } catch (error) {
                    showNotification(`更新失敗：${error.message}`, 'error');
                }
            };

            const renderEditModal = () => {
                if (!editTargetBooking) return null;
                const weekDates = getWeekDates(viewDate);
                const currentMondayStr = weekDates[0].dateStr;
                const isWeekArrangedForEdit = weekStatuses[currentMondayStr] || false;
                
                return (
                    <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 print-hide">
                        <div className="bg-white rounded-xl shadow-lg w-full max-w-md p-6 border border-gray-200">
                            <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center">
                                編輯預約 ({editTargetBooking.day} 第{editTargetBooking.period}節)
                            </h3>
                            <form onSubmit={saveEditBooking} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">班別</label>
                                        <select value={editTargetBooking.className} onChange={e => setEditTargetBooking({...editTargetBooking, className: e.target.value})} className="w-full p-2 border rounded-md outline-none bg-white">
                                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">科目</label>
                                        <select value={editTargetBooking.subject} onChange={e => setEditTargetBooking({...editTargetBooking, subject: e.target.value})} className="w-full p-2 border rounded-md outline-none bg-white">
                                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">教師代號</label>
                                        <select value={editTargetBooking.teacher} onChange={e => setEditTargetBooking({...editTargetBooking, teacher: e.target.value})} className="w-full p-2 border rounded-md outline-none bg-white">
                                            {TEACHERS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">車號</label>
                                        <select value={editTargetBooking.cart} onChange={e => setEditTargetBooking({...editTargetBooking, cart: e.target.value})} className="w-full p-2 border rounded-md outline-none bg-white">
                                            <option value="1號車">1號車</option>
                                            <option value="2號車">2號車</option>
                                            <option value="3號車">3號車</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">負責TA</label>
                                        <select disabled={isWeekArrangedForEdit} value={editTargetBooking.ta} onChange={e => setEditTargetBooking({...editTargetBooking, ta: e.target.value})} className={`w-full p-2 border rounded-md outline-none ${isWeekArrangedForEdit ? 'bg-gray-100 cursor-not-allowed' : 'bg-white'}`}>
                                            <option value="">無</option>
                                            {TAS.map(ta => <option key={ta} value={ta}>{ta}</option>)}
                                        </select>
                                        {isWeekArrangedForEdit && <span className="text-[11px] text-red-500 mt-1 block font-bold leading-tight">本週借用安排已完成，不能更改TA</span>}
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">數量 (部)</label>
                                        <input type="number" min="1" max="40" value={editTargetBooking.qty} onChange={e => setEditTargetBooking({...editTargetBooking, qty: e.target.value})} className="w-full p-2 border rounded-md outline-none" />
                                    </div>
                                </div>
                                <div className="flex space-x-3 mt-6">
                                    <button type="button" onClick={() => setEditTargetBooking(null)} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                    <button type="submit" className="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors">儲存變更</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            const handleAssignWorkerSubmit = async () => {
                const finalWorker = assignWorkerTarget.tempWorker !== undefined 
                    ? assignWorkerTarget.tempWorker 
                    : (assignWorkerTarget.isRecurring ? assignWorkerTarget.workerOverrides?.[assignWorkerTarget.activeDateStr] : assignWorkerTarget.workerCode) || '';
                    
                try {
                    const updates = [];
                    
                    if (assignWorkerTarget.isRecurring) {
                        const overrides = assignWorkerTarget.workerOverrides || {};
                        overrides[assignWorkerTarget.activeDateStr] = finalWorker;
                        updates.push(setDoc(getDocRef(String(assignWorkerTarget.id)), { ...assignWorkerTarget, workerOverrides: overrides }, { merge: true }));
                    } else {
                        updates.push(setDoc(getDocRef(String(assignWorkerTarget.id)), { ...assignWorkerTarget, workerCode: finalWorker }, { merge: true }));
                    }

                    // --- 連堂自動同步職工邏輯 ---
                    const allPeriods = PERIODS.filter(p => !p.isBreak).map(p => p.id);
                    const startIndex = allPeriods.indexOf(assignWorkerTarget.period);
                    if (startIndex !== -1) {
                        let currentIndex = startIndex + 1;
                        while (currentIndex < allPeriods.length) {
                            const nextPeriod = allPeriods[currentIndex];
                            const nextBooking = bookings.find(b => {
                                if (b.isSystem || b.period !== nextPeriod || b.className !== assignWorkerTarget.className || b.cart !== assignWorkerTarget.cart) return false;
                                const bDateStr = b.isRecurring ? assignWorkerTarget.activeDateStr : b.date;
                                const baseDateStr = assignWorkerTarget.isRecurring ? assignWorkerTarget.activeDateStr : assignWorkerTarget.date;
                                return bDateStr === baseDateStr && ((b.isRecurring && b.day === assignWorkerTarget.day) || (!b.isRecurring && b.date === baseDateStr));
                            });

                            if (nextBooking) {
                                if (nextBooking.isRecurring) {
                                    const sbOverrides = nextBooking.workerOverrides || {};
                                    sbOverrides[assignWorkerTarget.activeDateStr] = finalWorker;
                                    updates.push(setDoc(getDocRef(String(nextBooking.id)), { ...nextBooking, workerOverrides: sbOverrides }, { merge: true }));
                                } else {
                                    updates.push(setDoc(getDocRef(String(nextBooking.id)), { ...nextBooking, workerCode: finalWorker }, { merge: true }));
                                }
                                currentIndex++;
                            } else {
                                break;
                            }
                        }
                    }

                    await Promise.all(updates);
                    if (updates.length > 1) {
                        showNotification('已成功指派職工！(已自動同步職工至連堂課節)', 'success');
                    } else {
                        showNotification('已成功指派職工！', 'success');
                    }
                    setAssignWorkerTarget(null);
                } catch (error) {
                    showNotification(`指派失敗：${error.message}`, 'error');
                }
            };

            const renderAssignWorkerModal = () => {
                if (!assignWorkerTarget) return null;
                const currentWorker = assignWorkerTarget.tempWorker !== undefined 
                    ? assignWorkerTarget.tempWorker 
                    : (assignWorkerTarget.isRecurring ? assignWorkerTarget.workerOverrides?.[assignWorkerTarget.activeDateStr] : assignWorkerTarget.workerCode) || '';

                return (
                    <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 print-hide">
                        <div className="bg-white rounded-xl shadow-lg w-full max-w-sm p-6 border border-gray-200">
                            <h3 className="text-lg font-bold text-gray-900 mb-4 text-center">指派職工 ({assignWorkerTarget.cart})</h3>
                            <p className="text-sm text-gray-600 mb-6 text-center bg-gray-50 py-2 rounded border border-gray-100">{assignWorkerTarget.className} - {assignWorkerTarget.day} 第{assignWorkerTarget.period}節</p>
                            <div className="grid grid-cols-3 gap-2 mb-6">
                                {WORKERS.map(w => (
                                    <button
                                        key={w}
                                        onClick={() => setAssignWorkerTarget({...assignWorkerTarget, tempWorker: w})}
                                        className={`py-3 rounded-lg font-bold text-lg border-2 transition-colors ${currentWorker === w ? 'bg-blue-100 border-blue-500 text-blue-700' : 'bg-white border-gray-200 hover:bg-gray-100 text-gray-700'}`}
                                    >
                                        {w}
                                    </button>
                                ))}
                                <button
                                    onClick={() => setAssignWorkerTarget({...assignWorkerTarget, tempWorker: ''})}
                                    className={`py-3 rounded-lg font-bold text-sm border-2 col-span-3 transition-colors mt-2 ${currentWorker === '' ? 'bg-red-100 border-red-500 text-red-700' : 'bg-gray-50 border-gray-200 hover:bg-gray-100 text-gray-700'}`}
                                >
                                    清除指派 (改為未指派)
                                </button>
                            </div>
                            <div className="flex space-x-3">
                                <button onClick={() => setAssignWorkerTarget(null)} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                <button onClick={handleAssignWorkerSubmit} className="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors">確定指派</button>
                            </div>
                        </div>
                    </div>
                );
            };
            
            // 新增：特別活動及假期 Modal
            const renderHolidaysModal = () => {
                if (!showHolidaysModal) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 z-[110] flex items-center justify-center p-4 print-hide">
                        <div className="bg-white rounded-xl shadow-lg w-full max-w-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-bold text-gray-900 mb-2 flex items-center">
                                <Calendar className="w-5 h-5 mr-2 text-yellow-600" /> 設定特別活動及假期
                            </h3>
                            <p className="text-xs text-gray-500 mb-4 bg-gray-50 p-2 rounded">
                                請輸入日期及原因，支援單日或連續日期 (格式: <strong className="text-gray-700">D/M/YYYY</strong> 或 <strong className="text-gray-700">D/M/YYYY - D/M/YYYY</strong>)。日期與原因之間請以空格分隔。
                                <br/><span className="text-blue-600 font-bold">系統將自動按照日期先後排序，並自動為您對齊名稱。</span>
                            </p>
                            <textarea
                                className="w-full h-48 p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-mono whitespace-pre bg-[#fffdf0]"
                                value={tempHolidaysText}
                                onChange={(e) => setTempHolidaysText(e.target.value)}
                            />
                            <div className="flex space-x-3 mt-4">
                                <button onClick={() => setShowHolidaysModal(false)} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                <button onClick={() => {
                                    const formatted = formatAndSortDateText(tempHolidaysText);
                                    saveCalendarSettings('holidays', formatted);
                                    setTempHolidaysText(formatted);
                                    setShowHolidaysModal(false);
                                }} className="flex-1 py-2.5 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold rounded-lg transition-colors">儲存設定</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // 新增：半日上課 Modal
            const renderHalfDaysModal = () => {
                if (!showHalfDaysModal) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 z-[110] flex items-center justify-center p-4 print-hide">
                        <div className="bg-white rounded-xl shadow-lg w-full max-w-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-bold text-gray-900 mb-2 flex items-center">
                                <Calendar className="w-5 h-5 mr-2 text-green-600" /> 設定半日上課日子
                            </h3>
                            <p className="text-xs text-gray-500 mb-4 bg-gray-50 p-2 rounded">
                                請輸入半日上課的日期，支援單日或連續日期 (格式: <strong className="text-gray-700">D/M/YYYY</strong> 或 <strong className="text-gray-700">D/M/YYYY - D/M/YYYY</strong>)。
                                <br/><span className="text-green-600 font-bold">系統將自動按照日期先後排序，並自動對齊排版。</span>
                            </p>
                            <textarea
                                className="w-full h-48 p-3 border rounded-lg focus:ring-2 focus:ring-green-400 outline-none text-sm font-mono whitespace-pre bg-[#f0fdf4]"
                                value={tempHalfDaysText}
                                onChange={(e) => setTempHalfDaysText(e.target.value)}
                            />
                            <div className="flex space-x-3 mt-4">
                                <button onClick={() => setShowHalfDaysModal(false)} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                <button onClick={() => {
                                    const formatted = formatAndSortDateText(tempHalfDaysText);
                                    saveCalendarSettings('halfDays', formatted);
                                    setTempHalfDaysText(formatted);
                                    setShowHalfDaysModal(false);
                                }} className="flex-1 py-2.5 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg transition-colors">儲存設定</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // =====================================================================

            const handleLogin = (e) => {
                e.preventDefault();
                const inputHex = stringToHex(loginPassword);
                
                if (inputHex === '536d722d3132333435') {
                    setLoginRole('user');
                    setIsAdmin(false);
                    sessionStorage.setItem('loginRole', 'user');
                    sessionStorage.setItem('isAdmin', 'false');
                    
                    const defaultDate = getUserDefaultDate();
                    const dObj = new Date(defaultDate);
                    const dIdx = dObj.getDay();
                    const defaultDay = (dIdx === 0 || dIdx === 6) ? '週末及週日(不可借用)' : DAYS[dIdx - 1];
                    
                    setFormData({
                        date: defaultDate,
                        day: defaultDay,
                        periods: [],
                        className: '',
                        subject: '',
                        teacher: '',
                        qty: 35,
                        ta: '',
                        cart: ''
                    });
                    
                    showNotification('登入成功！一般使用者模式');
                } else if (inputHex === '536d722d32353236') {
                    setLoginRole('admin');
                    setIsAdmin(true);
                    sessionStorage.setItem('loginRole', 'admin');
                    sessionStorage.setItem('isAdmin', 'true');
                    
                    const defaultDate = getAdminDefaultDate();
                    const dObj = new Date(defaultDate);
                    const dIdx = dObj.getDay();
                    const defaultDay = (dIdx === 0 || dIdx === 6) ? '週末及週日(不可借用)' : DAYS[dIdx - 1];
                    
                    setFormData({
                        date: defaultDate,
                        day: defaultDay,
                        periods: [],
                        className: '',
                        subject: '',
                        teacher: '',
                        qty: 35,
                        ta: '',
                        cart: ''
                    });
                    
                    showNotification('登入成功！系統管理員模式');
                } else if (inputHex === '536d722d32363038') {
                    setLoginRole('office');
                    setIsAdmin(false);
                    sessionStorage.setItem('loginRole', 'office');
                    sessionStorage.setItem('isAdmin', 'false');
                    setActiveTab('schedule');
                    showNotification('登入成功！校務處模式');
                } else {
                    showNotification('密碼錯誤！', 'error');
                }
                setLoginPassword('');
            };

            const handleLogout = () => {
                setLoginRole(null);
                setIsAdmin(false);
                sessionStorage.removeItem('loginRole');
                sessionStorage.removeItem('isAdmin');
                setLoginPassword('');
                setActiveTab('form');
                showNotification('已登出系統');
            };

            const getWeekDates = (dateStr) => {
                const d = new Date(dateStr || new Date());
                const day = d.getDay() || 7;
                const monday = new Date(d);
                monday.setDate(d.getDate() - day + 1);

                return DAYS.map((name, i) => {
                    const curr = new Date(monday);
                    curr.setDate(monday.getDate() + i);
                    return {
                        name,
                        dateStr: getLocalYYYYMMDD(curr),
                        display: `${curr.getMonth() + 1}月${curr.getDate()}日`
                    };
                });
            };

            const renderBookingCard = (booking, themeStyles, viewOnly = false) => {
            const isSystemFixed = booking.isRecurring || (booking.cart === '3號車' && booking.subject?.includes('科技'));
            const isLocked = isSystemFixed || (booking.isConfirmed && !isAdmin);
            const isDraggable = !isSystemFixed && (!booking.isConfirmed || isAdmin) && !viewOnly;
            const isTechTeacher = TECH_TEACHERS.includes(booking.teacher);

            const taDisplay = booking.subject?.includes('科技') && /^[2-6]/.test(booking.className)
                ? `科任老師: ${booking.teacher}`
                : (booking.ta === '科任老師' ? `科任老師: ${booking.teacher}` : (booking.ta === 'Issac' || booking.ta === 'Ming' ? `ITRO: ${booking.ta}` : (booking.ta === 'Stephanie' ? `ITRA: ${booking.ta}` : (booking.ta ? `TA: ${booking.ta}` : (isTechTeacher ? `科任老師: ${booking.teacher}` : `TA: 未選取`)))));

            return (
                <div
                    key={booking.id}
                        draggable={isDraggable}
                        onDragStart={(e) => { if (isDraggable) e.dataTransfer.setData('bookingId', booking.id); }}
                        className={`group p-1.5 sm:p-2 rounded-lg border w-full flex flex-col justify-start shadow-sm h-[75px] sm:h-[86px] overflow-hidden relative ${isDraggable ? 'cursor-move hover:shadow-md' : 'opacity-95'} ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}
                        title={viewOnly ? "" : (isSystemFixed ? "固定課堂，不可調動或修改" : (booking.isConfirmed ? "點擊解除確認(需輸入管理員密碼)" : "老師/管理員：可按住拖曳以調動，或點擊編輯修改內容"))}
                    >
                        {isDraggable && (
                        <div className="absolute -top-2 -right-2 opacity-0 group-hover:opacity-100 bg-gray-800 text-white p-1 rounded-full pointer-events-none transition-opacity z-20">
                            <GripVertical size={12} />
                        </div>
                        )}

                    <div className="flex justify-between items-start font-bold mb-0.5 space-x-1 overflow-hidden w-full">
                        <span className="text-[16px] sm:text-[19px] lg:text-[20px] whitespace-normal break-words leading-none flex-1 min-w-0 text-left pb-0.5 font-black tracking-tight">
                            {booking.className} {booking.subject}({booking.teacher})
                        </span>
                        
                        <div className="text-[12px] sm:text-[14px] flex flex-col items-end flex-shrink-0 leading-tight text-right ml-auto font-bold gap-0.5 sm:gap-1">
                            {!viewOnly && !isSystemFixed && !booking.isConfirmed && (
                                <div className="flex flex-col items-end gap-0.5 sm:gap-1 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                                    <div className="flex gap-1 sm:gap-2">
                                        <span onClick={(e) => { e.stopPropagation(); confirmBooking(booking.id); }} className="cursor-pointer text-green-700 hover:underline z-10 whitespace-nowrap">確認</span>
                                        <span onClick={(e) => { e.stopPropagation(); setDeleteConfirmId(booking.id); }} className="cursor-pointer text-red-600 hover:underline z-10 whitespace-nowrap">刪除</span>
                                    </div>
                                    <span onClick={(e) => { e.stopPropagation(); setEditTargetBooking(booking); }} className={`cursor-pointer hover:underline z-10 whitespace-nowrap ${themeStyles.actionText || 'text-blue-700'}`}>編輯</span>
                                </div>
                            )}
                            {!viewOnly && !isSystemFixed && booking.isConfirmed && (
                                <span
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        if (isAdmin) {
                                            if (!user) { showNotification('尚未登入', 'error'); return; }
                                            setDoc(getDocRef(String(booking.id)), { ...booking, isConfirmed: false }, { merge: true })
                                            .then(() => showNotification('已解除確認，現在可作修改。', 'success'))
                                            .catch((error) => showNotification(`解除確認失敗：${error.message}`, 'error'));
                                        } else {
                                            setUnlockTargetId(booking.id);
                                        }
                                        }}
                                        className={`${themeStyles.actionText || 'text-green-600'} cursor-pointer hover:underline z-10 whitespace-nowrap`}
                                        title="點擊解除確認(需輸入管理員密碼)"
                                    >
                                        已確認
                                    </span>
                                )}
                                {!viewOnly && isSystemFixed && (
                                    <span className={`${themeStyles.actionText || 'text-purple-700'} whitespace-nowrap`}>固定</span>
                                )}
