                                {viewOnly && (booking.isConfirmed || isSystemFixed) && (
                                    <span className={`whitespace-nowrap ${themeStyles.actionText || (isSystemFixed ? 'text-purple-700' : 'text-green-600')}`}>
                                        {isSystemFixed ? '固定' : '已確認'}
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="flex justify-between items-center w-full mt-auto gap-1">
                        <div className="text-[11px] sm:text-[13px] lg:text-[14px] font-bold opacity-90 text-left whitespace-normal break-words leading-tight line-clamp-1 flex-1 min-w-0 tracking-tight">
                            {taDisplay}
                        </div>
                        <div className="text-[13px] sm:text-[15px] lg:text-[16px] font-black flex items-center justify-end whitespace-nowrap flex-shrink-0 ml-auto text-right">
                            <Truck size={15} className="mr-0.5 flex-shrink-0" /> {booking.cart}
                        </div>
                    </div>
                </div>
            );
        };

        const renderDateSelector = () => {
                const lastWeek = getDateStrFromMonday(-7);
                const thisWeek = getDateStrFromMonday(0);
                const nextWeek = getDateStrFromMonday(7);
                const weekAfterNext = getDateStrFromMonday(14);

                let pastWeekOptions = [];
                if (isAdmin) {
                    const termStart = new Date(2026, 1, 2); 
                    let currentIterDate = new Date(termStart);
                    const lastWeekDateObj = new Date(lastWeek);
                    
                    while (currentIterDate < lastWeekDateObj) {
                        const iterDateStr = getLocalYYYYMMDD(currentIterDate);
                        pastWeekOptions.push(
                            <option key={iterDateStr} value={iterDateStr}>
                                {generateCurrentWeekMsg(iterDateStr)}
                            </option>
                        );
                        currentIterDate.setDate(currentIterDate.getDate() + 7);
                    }
                }

                return (
                    <div className="mb-6 flex flex-col sm:flex-row items-start sm:items-center bg-white p-3 rounded-lg border border-gray-200 shadow-sm gap-2 w-full sm:w-max print-hide">
                        <div className="flex items-center">
                        <Calendar className="mr-2 text-blue-600 flex-shrink-0" size={20} />
                        <label className="text-sm font-medium text-gray-700 mr-2 whitespace-nowrap">選擇檢視週次：</label>
                        </div>
                        <select
                        value={viewDate}
                        onChange={e => setViewDate(e.target.value)}
                        className="w-full sm:w-auto p-1.5 border rounded-md text-sm outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 font-medium bg-gray-50 cursor-pointer"
                        >
                        <option value={lastWeek}>上週 - {generateCurrentWeekMsg(lastWeek)}</option>
                        <option value={thisWeek}>本週 - {generateCurrentWeekMsg(thisWeek)}</option>
                        <option value={nextWeek}>下週 - {generateCurrentWeekMsg(nextWeek)}</option>
                        <option value={weekAfterNext}>下下週 - {generateCurrentWeekMsg(weekAfterNext)}</option>
                        {isAdmin && pastWeekOptions.length > 0 && (
                            <optgroup label="過往週次 (管理員專用)">
                                {pastWeekOptions.reverse()}
                            </optgroup>
                        )}
                        </select>
                        <span className="text-xs text-gray-500 block sm:inline whitespace-normal sm:whitespace-nowrap mt-1 sm:mt-0">(可預約未來兩星期的課室平板電腦)</span>
                    </div>
                );
            };

            const renderForm = () => {
                let availabilityMsg = "";
                let isFull = false;
                
                const getMondayStr = (offset) => {
                    const d = new Date();
                    const day = d.getDay() || 7;
                    d.setDate(d.getDate() - day + 1 + (offset * 7));
                    return getLocalYYYYMMDD(d);
                };
                const nextMondayStr = getMondayStr(1);
                const weekAfterNextMondayStr = getMondayStr(2);
                
                const dateSuffix = formData.date.substring(5);
                const blackoutReason = parsedHolidays[formData.date] || BLACKOUT_DATES[dateSuffix];

                if (formData.day === '週末及週日(不可借用)') {
                    availabilityMsg = "週末及週日不提供借用服務，請選擇星期一至星期五的日期。";
                    isFull = true;
                } else if (blackoutReason) {
                    availabilityMsg = `系統提示：${formData.date} 為 ${blackoutReason}，暫停借用服務。`;
                    isFull = true;
                } else if (formData.periods.length === 0) {
                    availabilityMsg = "請點選欲借用的課節。";
                } else {
                    if (!isAdmin && formData.date < nextMondayStr) {
                        availabilityMsg = "一般使用者只可預約未來兩星期的課節。";
                        isFull = true;
                    } else if (!isAdmin && isPastThursdayCutoff() && formData.date < weekAfterNextMondayStr) {
                        availabilityMsg = "星期四下午4時後暫停下星期借用。";
                        isFull = true;
                    } else {
                        let hasBlackout = false;
                        for (let pid of formData.periods) {
                            if (!isAdmin && BLACKOUT_PERIODS[formData.day] && BLACKOUT_PERIODS[formData.day][pid]) {
                                hasBlackout = true;
                                break;
                            }
                        }
                        
                        if (hasBlackout) {
                            availabilityMsg = "選擇的部份節數為特別課堂，暫停借用。";
                            isFull = true;
                        } else {
                            if (formData.cart) {
                                let conflict = false;
                                for (let pid of formData.periods) {
                                    if (bookings.some(b => !b.isSystem && b.period === pid && b.cart === formData.cart && (b.date === formData.date || (b.isRecurring && b.day === formData.day)))) {
                                        conflict = true;
                                        break;
                                    }
                                }
                                if (conflict) {
                                    availabilityMsg = `您指定的 ${formData.cart} 在選擇的部份節數已被借用。`;
                                    isFull = true;
                                } else {
                                    availabilityMsg = `您指定的 ${formData.cart} 在所選節數皆可借用。`;
                                }
                            } else {
                                const plan = planAssignments(formData.date, formData.day, formData.periods, formData.subject, formData.className);
                                if (!plan.success) {
                                    availabilityMsg = plan.message;
                                    isFull = true;
                                } else if (plan.rearrangements && plan.rearrangements.length > 0) {
                                    availabilityMsg = `系統偵測可自動調節車號，將安排同車連堂給您 (需確認)。`;
                                } else {
                                    let cart1Free = true;
                                    let cart2Free = true;
                                    let cart3Free = true;
                                    for (let pid of formData.periods) {
                                        const currentBookings = bookings.filter(b =>
                                            !b.isSystem &&
                                            b.period === pid &&
                                            (b.date === formData.date || (b.isRecurring && b.day === formData.day))
                                        );
                                        const usedCarts = currentBookings.map(b => b.cart);
                                        if (usedCarts.includes('1號車')) cart1Free = false;
                                        if (usedCarts.includes('2號車')) cart2Free = false;
                                        if (usedCarts.includes('3號車')) cart3Free = false;
                                    }

                                    let idleMsg = "";
                                    if (isAdmin) {
                                        const availCarts = [];
                                        if (cart1Free) availCarts.push("1號車");
                                        if (cart2Free) availCarts.push("2號車");
                                        if (cart3Free) availCarts.push("3號車");
                                        
                                        if (availCarts.length > 0) {
                                            idleMsg = `${availCarts.join('、')} 閒置可借用`;
                                        } else {
                                            idleMsg = "所有車輛均已被借出";
                                        }
                                    } else {
                                        if (cart1Free && cart2Free) {
                                            idleMsg = "1號及2號車皆閒置可借用";
                                        } else if (cart1Free) {
                                            idleMsg = "1號車閒置可借用,2號車已借出";
                                        } else if (cart2Free) {
                                            idleMsg = "2號車閒置可借用,1號車已借出";
                                        } else {
                                            idleMsg = "將由系統混合安排1號及2號車";
                                        }
                                    }

                                    availabilityMsg = (
                                        <span>
                                            目前選取的{formData.periods.length}節課,{idleMsg}. 
                                            <span className="block sm:inline">(若有連堂安排,系統會盡量安排同車)</span>
                                        </span>
                                    );
                                }
                            }
                        }
                    }
                }

                const isGrade2To6TechForm = /^[2-6]/.test(formData.className) && formData.subject?.includes('科技');

                const getMondayStrOfDate = (dateStr) => {
                    const d = new Date(dateStr);
                    const day = d.getDay() || 7;
                    const monday = new Date(d);
                    monday.setDate(d.getDate() - day + 1);
                    return getLocalYYYYMMDD(monday);
                };
                const currentSelectedMondayStr = getMondayStrOfDate(formData.date);
                const isSelectedDateHalfDay = checkIsHalfDay(currentSelectedMondayStr, formData.date);

                return (
                <div className="w-full md:max-w-4xl lg:max-w-5xl mx-auto bg-white p-6 md:p-10 rounded-xl shadow-sm border border-gray-100">
                    <div className="mb-6 md:mb-8 pb-4 border-b">
                        <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex flex-col sm:flex-row items-start sm:items-center">
                            <div className="flex items-center">
                                <MonitorSmartphone className="text-blue-600 w-6 h-6 md:w-8 md:h-8 mr-2 md:mr-3 flex-shrink-0" />
                                <span>平板電腦借用申請</span>
                            </div>
                        </h2>
                        <div className="block sm:inline-block bg-blue-50 text-blue-800 px-3.5 py-2 rounded-md text-sm font-semibold border border-blue-100 shadow-sm mt-3 overflow-x-auto w-full sm:w-auto">
                            {generateBookingRangeMsg()}
                        </div>
                        
                        {/* 新增：管理員設定特別活動與半日上課按鈕 (移至此處) */}
                        {isAdmin && (
                            <div className="flex space-x-3 mt-4">
                                <button
                                    type="button"
                                    onClick={() => { setTempHolidaysText(holidaysText); setShowHolidaysModal(true); }}
                                    className="px-4 py-2 bg-[#fef9c3] hover:bg-[#fde047] text-yellow-800 font-bold rounded-lg border border-yellow-300 shadow-sm text-sm transition-colors flex items-center"
                                >
                                    <Calendar className="w-4 h-4 mr-1.5 text-yellow-700" />
                                    特別活動及假期
                                </button>
                                <button
                                    type="button"
                                    onClick={() => { setTempHalfDaysText(halfDaysText); setShowHalfDaysModal(true); }}
                                    className="px-4 py-2 bg-[#dcfce7] hover:bg-[#86efac] text-green-800 font-bold rounded-lg border border-green-300 shadow-sm text-sm transition-colors flex items-center"
                                >
                                    <Calendar className="w-4 h-4 mr-1.5 text-green-700" />
                                    半日上課
                                </button>
                            </div>
                        )}
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-5 md:space-y-8">
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 md:gap-8 w-full">
                        <div className="w-full sm:flex-1 min-w-0 space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700 whitespace-nowrap">
                            借用日期
                            {isSelectedDateHalfDay && <span className="text-orange-600 font-bold ml-1 md:ml-2">(半日上課)</span>}
                        </label>
                        <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full min-w-full appearance-none px-2 sm:px-2.5 py-2 sm:p-2.5 md:p-3.5 text-sm sm:text-base md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none box-border block bg-white" required />
                        </div>
                        <div className="w-full sm:flex-1 min-w-0 space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700 whitespace-nowrap">星期</label>
                        <input type="text" name="day" value={formData.day} readOnly className="w-full min-w-full appearance-none px-2 sm:px-2.5 py-2 sm:p-2.5 md:p-3.5 text-sm sm:text-base md:text-lg border rounded-lg bg-gray-50 text-gray-500 outline-none cursor-not-allowed text-ellipsis whitespace-nowrap overflow-hidden box-border block" />
                        </div>
                    </div>

                    <div className="space-y-2 md:space-y-3">
                        <label className="text-sm md:text-base font-medium text-gray-700 block">
                            課節 <span className="text-blue-600 text-xs md:text-sm ml-1">(若連堂借用，教師可多選連堂節數)</span>
                        </label>
                        
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2 md:gap-3">
                        {PERIODS.filter(p => !p.isBreak).map(p => (
                            <button
                            key={p.id}
                            type="button"
                            onClick={() => handlePeriodToggle(p.id)}
                            className={`w-full py-2.5 rounded-lg border text-sm md:text-base font-medium transition-colors flex justify-center items-center ${formData.periods.includes(p.id)
                                ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                                : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'
                                }`}
                            >
                            {p.name}
                            </button>
                        ))}
                        </div>
                    </div>

                    <div className="-mt-1 mb-2 md:mb-4 md:text-lg">
                        {isFull ? (
                        <div className="text-red-500 text-sm md:text-base flex items-start sm:items-center font-medium"><Info size={14} className="mr-1 mt-0.5 sm:mt-0 md:w-5 md:h-5 flex-shrink-0" /> <div>{availabilityMsg}</div></div>
                        ) : (
                        <div className="text-green-600 text-sm md:text-base flex items-start sm:items-center font-medium"><Info size={14} className="mr-1 mt-0.5 sm:mt-0 md:w-5 md:h-5 flex-shrink-0" /> <div>{availabilityMsg}</div></div>
                        )}
                    </div>

                    <div className="grid grid-cols-3 gap-4 md:gap-8 border-t pt-4 md:pt-8">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">班別</label>
                        <select name="className" value={formData.className} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇班別</option>
                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">科目</label>
                        <select name="subject" value={formData.subject} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇科目</option>
                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">教師代號</label>
                        <select name="teacher" value={formData.teacher} onChange={handleInputChange} className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="" disabled>選擇教師</option>
                            {TEACHERS.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-8 mt-4 md:mt-6">
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">車號 (選填)</label>
                        <select name="cart" value={formData.cart} onChange={handleInputChange} disabled={!isAdmin} className={`w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none ${!isAdmin ? 'bg-gray-100 cursor-not-allowed' : 'bg-white'}`}>
                            <option value="">自動分配</option>
                            <option value="1號車">1號車</option>
                            <option value="2號車">2號車</option>
                            <option value="3號車">3號車</option>
                        </select>
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">需要數量 (部)</label>
                        <input type="number" name="qty" value={formData.qty} onChange={handleInputChange} min="1" max="40" className="w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                        <div className="space-y-1.5 md:space-y-2">
                        <label className="text-sm md:text-base font-medium text-gray-700">負責TA (選填)</label>
                        <select name="ta" value={formData.ta} onChange={handleInputChange} disabled={!isAdmin || isGrade2To6TechForm} className={`w-full p-2.5 md:p-3.5 md:text-lg border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none ${(!isAdmin || isGrade2To6TechForm) ? 'bg-gray-100 cursor-not-allowed' : 'bg-white'}`}>
                            <option value="">選擇TA (選填)</option>
                            {TAS.map(ta => <option key={ta} value={ta}>{ta}</option>)}
                        </select>
                        </div>
                    </div>

                    <div className="bg-blue-50 p-4 md:p-6 rounded-lg flex items-start space-x-3 text-sm md:text-base text-blue-800 mt-6">
                        <div>
                        <p className="font-semibold mb-2">借用平板電腦的注意事項：</p>
                        <ol className="list-decimal pl-4 space-y-1 opacity-90">
                            <li>設定管理員可刪除或調動教師已設定借用的課堂(以方塊的形式移動借用課節位置)</li>
                            <li>教師可檢視及預約借用未來兩星期的課室平板電腦.每星期四下午4時會截數.</li>
                            <li>教師只可瀏覽本星期借用情況,並不設借用.(因已作安排)</li>
                            <li>供一至四年級課室借出的平板電腦為 1, 2號車。</li>
                            <li>系統會自動為「2-6年級科技課」指派 3號車,暫不安排借出給其他課堂使用。</li>
                            <li>如借用節數已被安排，系統會檢視並提示其他車號(1,2號)能否借用。</li>
                            <li>「綜合課」、「生教課」、「課外活動」為特別課堂，暫不開放借用。</li>
                            <li>如特別活動急需使用平板電腦進行活動,請與「資訊科技及數字教育組」聯絡,本組因應情況盡量安排.</li>
                        </ol>
                        </div>
                    </div>

                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 md:py-4 rounded-lg md:text-xl transition-colors flex justify-center items-center space-x-2 mt-6">
                        <CheckCircle2 className="w-5 h-5 md:w-6 md:h-6 mr-2" />
                        <span>提交借用申請</span>
                    </button>
                    </form>
                </div>
                );
            };

            const renderCartRecords = (cartLabel, locationText, themeStyles) => {
                const weekDates = getWeekDates(viewDate);

                return (
                <div className={`mb-8 bg-white p-2 sm:p-4 rounded-xl shadow-sm border ${themeStyles.border}`}>
                    <h3 className={`text-lg font-bold flex flex-col sm:flex-row sm:items-center mb-4 px-1 sm:px-0 ${themeStyles.text}`}>
                    <div className="flex items-center">
                        <Truck className="mr-2" size={20} />
                        <span>{cartLabel} 借用紀錄表{locationText}</span>
                    </div>
                    <span className="text-sm font-bold text-black sm:ml-2 mt-1 sm:mt-0">
                        ({generateCurrentWeekMsg(viewDate)})
                    </span>
                    </h3>
                    <div className="overflow-x-auto w-full pb-4">
                        <table className="w-full border-collapse border border-black schedule-table text-sm table-fixed min-w-[1000px] md:min-w-[1200px] xl:min-w-[1400px]">
                            <thead>
                            <tr>
                                <th className="border border-black p-1 sm:p-1.5 lg:p-2 bg-blue-100 text-center w-[76px] sm:w-[80px] md:w-[115px] lg:w-[90px] min-w-[76px] sm:min-w-[80px] md:min-w-[115px] lg:min-w-[90px] max-w-[76px] sm:max-w-[80px] md:max-w-[115px] lg:max-w-[90px] shadow-sm align-middle tablet-landscape-time-col mobile-landscape-time-col">
                                    <div className="text-[11px] sm:text-[13px] lg:text-[15px] font-extrabold text-blue-900 leading-tight whitespace-nowrap tracking-tighter">節數/時間</div>
                                </th>
                                {weekDates.map(wd => {
                                    const currentMondayStr = weekDates[0].dateStr;
                                    const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);
                                    return (
                                    <th key={wd.name} className={`border border-black p-1 sm:p-2 text-center align-middle w-auto min-w-[160px] sm:min-w-[190px] lg:min-w-[210px] ${isHalfDay ? 'bg-orange-200 text-orange-900' : 'bg-blue-100 text-blue-900'}`}>
                                        <div className="flex flex-col justify-center items-center w-full">
                                            <div className="w-full font-extrabold text-[13px] sm:text-lg text-center">
                                                {wd.display}
                                                {isHalfDay && <span className="text-red-600 ml-1 text-[11px] sm:text-[14px]">(半日)</span>}
                                            </div>
                                            <div className="w-full font-bold text-[12px] sm:text-base text-center">{wd.name}</div>
                                        </div>
                                    </th>
                                    );
                                })}
                            </tr>
                            </thead>
                            <tbody>
                            {PERIODS.map(period => {
                                if (period.isBreak) {
                                    const isBlackBold = ['小息', '小休', '午膳', '午息'].includes(period.name);
                                    return (
                                        <tr key={period.id} className="bg-gray-50">
                                        <td className={`border border-black p-1 sm:p-2 text-center ${isBlackBold ? 'text-black font-extrabold text-base sm:text-lg lg:text-xl' : 'text-gray-700 font-bold text-sm sm:text-base lg:text-lg'}`} colSpan={6}>
                                            {period.name} ({period.time})
                                        </td>
                                        </tr>
                                    );
                                }
                                
                                let periodNameClass = "font-extrabold mb-1 sm:mb-1.5 text-gray-900 whitespace-nowrap transition-all text-[15px] sm:text-[17px] lg:text-[19px]";
                                let periodTimeClass = "font-bold tracking-tighter whitespace-nowrap leading-none text-gray-800 transition-all text-[10px] sm:text-[12px] lg:text-[13px]";

                                return (
                                <tr key={period.id}>
                                    <td className="border border-black p-1 sm:p-1.5 bg-gray-200 text-center align-middle w-[76px] sm:w-[80px] md:w-[115px] lg:w-[90px] min-w-[76px] sm:min-w-[80px] md:min-w-[115px] lg:min-w-[90px] max-w-[76px] sm:max-w-[80px] md:max-w-[115px] lg:max-w-[90px] tablet-landscape-time-col mobile-landscape-time-col">
                                        <div className={periodNameClass}>{period.name}</div>
                                        <div className={periodTimeClass}>
                                            <span>{period.time}</span>
                                        </div>
                                    </td>
                                    {weekDates.map(wd => {
                                    const currentMondayStr = weekDates[0].dateStr;
                                    const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);

                                    const cellBookings = bookings.filter(b =>
                                        (b.isSystem && b.day === wd.name && b.period === period.id) ||
                                        (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                                        (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                                    );
                                    
                                    const dateSuffix = wd.dateStr.substring(5);
                                    const blackoutReason = parsedHolidays[wd.dateStr] || BLACKOUT_DATES[dateSuffix];
                                    const isDateBlackout = Boolean(blackoutReason);
                                    const isSystemBlackout = cellBookings.some(b => b.isSystem);
                                    const booking = cellBookings.find(b => !b.isSystem && b.cart === cartLabel);

                                    if (isDateBlackout || (isSystemBlackout && !isAdmin && !booking)) {
                                        const remark = blackoutReason || cellBookings.find(b => b.isSystem).remark;
                                        return (
                                        <td key={`${wd.name}-${period.id}`} className="border border-black p-1 sm:p-2 align-middle text-center bg-[#f5f5dc]">
                                            <span className="text-black font-extrabold text-[18px] sm:text-[22px] lg:text-[26px] print:text-[15px]">{remark}</span>
                                        </td>
                                        );
                                    }

                                    return (
                                        <td
                                        key={`${wd.name}-${period.id}`}
                                        className={`border border-black p-1 sm:p-2 align-top transition-colors ${isSystemBlackout ? 'bg-[#f5f5dc]' : (isHalfDay ? 'bg-orange-50' : '')}`}
                                        onDragOver={(e) => { if (isAdmin || !isSystemBlackout) e.preventDefault(); }}
                                        onDrop={(e) => handleDrop(e, wd.dateStr, period.id, wd.name, cartLabel)}
                                        >
                                        <div className="h-full w-full flex items-center justify-center">
                                            {booking ? renderBookingCard(booking, themeStyles) : (
                                                <div className={`w-full rounded-lg border-2 border-transparent hover:border-dashed hover:border-gray-400 flex items-center justify-center h-[75px] sm:h-[86px] transition-all text-center ${isSystemBlackout ? 'text-black' : 'text-transparent hover:text-gray-500 text-xs font-bold'}`}>
                                                {isSystemBlackout ? (
                                                    <span className="font-extrabold text-[18px] sm:text-[22px] lg:text-[26px] print:text-[15px]">{cellBookings.find(b => b.isSystem).remark}</span>
                                                ) : '可拖曳至此'}
                                                </div>
                                            )}
                                        </div>
                                        </td>
                                    );
                                    })}
                                </tr>
                                )
                            })}
                            </tbody>
                        </table>
                    </div>
                </div>
                );
            };

            const renderRecords = () => (
                <div className="space-y-2 w-full max-w-full overflow-hidden">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 relative">
                    <h2 className="text-xl font-bold text-gray-800 flex flex-row items-center flex-wrap">
                    <div className="flex items-center">
                        <List className="mr-2 text-blue-600 flex-shrink-0" size={24} />
                        <span>借用紀錄清單</span>
                    </div>
                    <span className="text-base text-gray-600 ml-2">(按車號分配)</span>
                    </h2>

                    <div className="block sm:inline-block bg-blue-50 text-blue-800 px-3.5 py-2 rounded-md text-sm font-semibold border border-blue-100 shadow-sm mt-3 overflow-x-auto w-full sm:w-auto">
                    {generateBookingRangeMsg()}
                    </div>
                </div>

                {renderDateSelector()}
                {renderCartRecords('1號車', '(課室)', { border: 'border-blue-400 border-[1.5px]', text: 'text-blue-900', bg: 'bg-blue-50', actionText: 'text-blue-700' })}
                {renderCartRecords('2號車', '(課室)', { border: 'border-green-500 border-[1.5px]', text: 'text-green-900', bg: 'bg-green-50', actionText: 'text-green-700' })}
                {renderCartRecords('3號車', '(電腦室)', { border: 'border-purple-400 border-[1.5px]', text: 'text-purple-900', bg: 'bg-purple-50', actionText: 'text-purple-700' })}
                </div>
            );

            const renderSchedule = (mode = 'normal') => {
                const weekDates = getWeekDates(viewDate);
                const currentMondayStr = weekDates[0].dateStr;
                const isWeekArranged = weekStatuses[currentMondayStr] || false;
                const isWorkerArranged = weekWorkerStatuses[currentMondayStr] || false;

                let titleText = "每週平板電腦(iPad) 借用總表";
                if (mode === 'duty') titleText = "安排職務總表(校務處)";
                if (mode === 'office') titleText = "每週平板電腦運送安排總表";

                const renderSimplifiedScheduleCard = (booking, activeDateStr) => {
                    let themeStyles = { bg: "bg-gray-100", border: "border-gray-300", text: "text-gray-800", actionText: "text-gray-600", textBgClass: "text-gray-700 bg-gray-200" };
                    if (booking.cart === '1號車') themeStyles = { bg: "bg-blue-50", border: "border-blue-400 border-[1.5px]", text: "text-blue-900", actionText: "text-blue-700", textBgClass: "text-blue-700 bg-blue-100" };
                    if (booking.cart === '2號車') themeStyles = { bg: "bg-green-50", border: "border-green-500 border-[1.5px]", text: "text-green-900", actionText: "text-green-700", textBgClass: "text-green-700 bg-green-100" };
                    if (booking.cart === '3號車') themeStyles = { bg: "bg-purple-50", border: "border-purple-400 border-[1.5px]", text: "text-purple-900", actionText: "text-purple-700", textBgClass: "text-purple-700 bg-purple-100" };

                    if (mode === 'duty' || mode === 'office') {
                        const isComputerRoomFixed = /^[2-6]/.test(booking.className) && booking.subject?.includes('科技');
                        return (
                            <div key={booking.id} className={`p-1.5 sm:p-2 rounded-lg border w-full flex shadow-sm h-[75px] sm:h-[86px] mb-1 overflow-hidden ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}>
                                <div className="flex flex-col justify-between flex-1 pr-1 overflow-hidden">
                                    <div className="flex items-center gap-1.5 overflow-hidden mt-0.5">
                                        <div className="font-black text-[24px] sm:text-[28px] lg:text-[30px] leading-none tracking-tight truncate">
                                            {booking.className}
                                        </div>
                                        {mode === 'duty' && !isComputerRoomFixed && (
                                            <span onClick={(e) => { 
                                                e.stopPropagation(); 
                                                if (isWorkerArranged) {
                                                    showNotification('已完成本週職工安排，不能再作調動', 'error');
                                                } else {
                                                    setAssignWorkerTarget({...booking, activeDateStr}); 
                                                }
                                            }} className={`cursor-pointer text-[11px] sm:text-[12px] font-bold z-10 whitespace-nowrap flex-shrink-0 self-center hover:underline ${themeStyles.actionText}`}>
                                                編輯
                                            </span>
                                        )}
                                    </div>
                                    <div className="flex items-center mb-0.5">
                                        <div className="text-[13px] sm:text-[15px] font-black flex items-center whitespace-nowrap tracking-tight">
                                            <Truck size={14} className="mr-1 flex-shrink-0" /> {booking.cart}
                                        </div>
                                    </div>
                                </div>
                                <div className="w-[50px] sm:w-[60px] lg:w-[65px] flex-shrink-0 flex items-center justify-center border-l border-black/10 pl-1 overflow-hidden">
                                    {(booking.isRecurring ? booking.workerOverrides?.[activeDateStr] : booking.workerCode) ? (
                                        <span className="font-black text-[28px] sm:text-[34px] text-center leading-none">
                                            {booking.isRecurring ? booking.workerOverrides?.[activeDateStr] : booking.workerCode}
                                        </span>
                                    ) : (
                                        <span className="font-bold text-[12px] sm:text-[13px] lg:text-[14px] text-center text-gray-500 whitespace-nowrap tracking-tight">
                                            {isComputerRoomFixed ? "電腦室" : "未指派"}
                                        </span>
                                    )}
                                </div>
                            </div>
                        );
                    }

                    let secondLine = '';
                const isGrade2To6Tech = booking.subject?.includes('科技') && /^[2-6]/.test(booking.className);
                const isTechTeacher = TECH_TEACHERS.includes(booking.teacher);

                if (isGrade2To6Tech) {
                    secondLine = `科任老師: ${booking.teacher}`;
                } else {
                    if (booking.ta === '科任老師') {
                        secondLine = `科任老師: ${booking.teacher}`;
                    } else if (booking.ta === 'Issac' || booking.ta === 'Ming') {
                        secondLine = `ITRO: ${booking.ta}`;
                    } else if (booking.ta === 'Stephanie') {
                        secondLine = `ITRA: ${booking.ta}`;
                    } else if (booking.ta) {
                        secondLine = `TA: ${booking.ta}`;
                    } else if (isTechTeacher) {
                        secondLine = `科任老師: ${booking.teacher}`;
                    } else {
                        secondLine = `TA: 未選取`; 
                    }
                }

                const isSystemFixed = booking.isRecurring || (booking.cart === '3號車' && booking.subject?.includes('科技'));

                return (
                    <div key={booking.id} className={`group p-1.5 sm:p-2 rounded-lg border w-full flex flex-col justify-start shadow-sm h-[75px] sm:h-[86px] mb-1 overflow-hidden ${themeStyles.bg} ${themeStyles.border} ${themeStyles.text}`}>
                            <div className="flex justify-between items-start font-bold mb-0.5 space-x-1 overflow-hidden w-full">
                                <span className="text-[16px] sm:text-[19px] lg:text-[20px] whitespace-normal break-words leading-none flex-1 min-w-0 text-left pb-0.5 font-black tracking-tight">
                                    {booking.className} {booking.subject}({booking.teacher})
                                </span>
                                <div className="text-[12px] sm:text-[14px] flex items-start flex-shrink-0 leading-tight text-right ml-auto font-bold">
                                    {isSystemFixed ? (
                                        <span className={`whitespace-nowrap inline-block flex-shrink-0 ${themeStyles.actionText}`}>固定</span>
                                    ) : isAdmin ? (
                                        <span 
                                            onClick={(e) => { 
                                                e.stopPropagation(); 
                                                if (isWeekArranged) {
                                                    showNotification('已完成本週借用安排,不能再作調動', 'error');
                                                } else {
                                                    setEditTargetBooking(booking); 
                                                }
                                            }} 
                                            className={`cursor-pointer z-10 whitespace-nowrap flex-shrink-0 hover:underline ${themeStyles.actionText}`}
                                        >
                                            編輯
                                        </span>
                                    ) : null}
                                </div>
                            </div>
                            
                            <div className="flex justify-between items-center w-full mt-auto gap-1">
                                <div className="text-[11px] sm:text-[13px] lg:text-[14px] font-bold opacity-90 text-left whitespace-normal break-words leading-tight line-clamp-1 flex-1 min-w-0 tracking-tight">
                                    {secondLine}
                                </div>
                                <div className="text-[13px] sm:text-[15px] lg:text-[16px] font-black flex items-center justify-end whitespace-nowrap flex-shrink-0 ml-auto text-right">
                                    <Truck size={15} className="mr-0.5 flex-shrink-0" /> {booking.cart}
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                <div>
                    {renderDateSelector()}
                    <div className="bg-white p-2 sm:p-4 lg:p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto w-full pb-4 print-overflow-visible print:p-0 print:border-none print:shadow-none">
                    
                    <div className="hidden print:block w-full mb-4 px-2">
                        <div className="flex justify-between items-end border-b-2 border-black pb-1">
                            <div className="text-xl font-bold">觀塘官立小學(秀明道)</div>
                            <div className="text-sm font-bold">列印日期: {getPrintDateString()}</div>
                        </div>
                        <div className="text-center text-2xl font-bold mt-3">
                            每週平板電腦(iPad)借用總表 ({generateCurrentWeekMsg(viewDate)})
                        </div>
                    </div>

                    <div className="flex flex-col mb-6 gap-4 overflow-hidden print-hide">
                        <h2 className="text-xl font-bold text-gray-800 flex flex-col sm:flex-row items-start sm:items-center flex-shrink-0">
                            <div className="flex items-center mb-1 sm:mb-0">
                                <Calendar className="mr-2 text-blue-600 flex-shrink-0" size={24} />
                                <span>{titleText}</span>
                            </div>
                            <div className="text-sm sm:text-xl font-bold text-gray-800 sm:ml-2 flex flex-col sm:flex-row sm:items-center w-full sm:w-auto">
                                <span className="mb-2 sm:mb-0">({generateCurrentWeekMsg(viewDate)})</span>
                                
                                {mode === 'normal' && (loginRole === 'admin' || loginRole === 'office') && (
                                    <label className={`w-max ml-0 sm:ml-4 mb-2 sm:mb-0 flex items-center text-sm font-bold text-blue-800 bg-blue-50 px-2 py-1 rounded border border-blue-200 shadow-sm whitespace-nowrap print-hide ${loginRole === 'office' ? 'cursor-not-allowed opacity-80' : 'cursor-pointer'}`}>
                                        <input
                                            type="checkbox"
                                            className={`mr-1.5 w-4 h-4 text-blue-600 rounded focus:ring-blue-500 ${loginRole === 'office' ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                                            checked={isWeekArranged}
                                            disabled={loginRole === 'office'}
                                            onChange={() => loginRole === 'admin' && handleWeekStatusToggle(currentMondayStr, isWeekArranged)}
                                        />
                                        已完成本週借用安排
                                    </label>
                                )}
                                {(mode === 'normal' && loginRole === 'user' && isWeekArranged) ? null : ''}
                                
                                {mode === 'duty' && (loginRole === 'admin' || loginRole === 'office') && (
                                    <label className={`w-max ml-0 sm:ml-4 mb-2 sm:mb-0 flex items-center text-sm font-bold text-green-800 bg-green-50 px-2 py-1 rounded border border-green-200 shadow-sm whitespace-nowrap print-hide ${loginRole !== 'admin' ? 'cursor-not-allowed opacity-80' : 'cursor-pointer'}`}>
                                        <input
                                            type="checkbox"
                                            className={`mr-1.5 w-4 h-4 text-green-600 rounded focus:ring-green-500 ${loginRole !== 'admin' ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                                            checked={isWorkerArranged}
                                            disabled={loginRole !== 'admin'}
                                            onChange={() => loginRole === 'admin' && handleWeekWorkerStatusToggle(currentMondayStr, isWorkerArranged)}
                                        />
                                        已完成本週職工安排
                                    </label>
                                )}

                                {(mode === 'duty' || mode === 'office') && (
                                    <span className={`block w-max ml-0 sm:ml-3 mb-2 sm:mb-0 text-sm sm:text-lg whitespace-nowrap print-hide ${isWeekArranged ? 'text-blue-600' : 'text-red-500'}`}>
                                        {isWeekArranged ? '(可安排職工值崗)' : '(課堂編排尚未完成,請耐心等待)'}
                                    </span>
                                )}
                            </div>
                        </h2>
                        
                        <div className="flex flex-col gap-3 w-full">
                            <div className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full overflow-x-auto pb-1 sm:pb-0 scrollbar-hide print-hide">
                                <span className="text-gray-600 mr-1 sm:mr-2 font-bold whitespace-nowrap flex-shrink-0">顯示/隱藏：</span>
                                <button
                                    onClick={() => toggleCartVisibility('1號車')}
                                    className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('1號車') ? 'text-blue-700 bg-blue-100 border-blue-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 1號車
                                </button>
                                <button
                                    onClick={() => toggleCartVisibility('2號車')}
                                    className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('2號車') ? 'text-green-700 bg-green-100 border-green-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 2號車
                                </button>
                                <button
                                    onClick={() => toggleCartVisibility('3號車')}
                                    className={`flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 flex-shrink-0 whitespace-nowrap ${visibleCarts.includes('3號車') ? 'text-purple-700 bg-purple-100 border-purple-300' : 'text-gray-400 bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    <Truck size={14} className="mr-1 sm:w-4 sm:h-4 w-3.5 h-3.5" /> 3號車
                                </button>
                                {mode === 'normal' && loginRole === 'admin' && (
                                    <button onClick={handleExportExcel} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-blue-700 bg-blue-100 border-blue-300 hover:bg-blue-200 whitespace-nowrap flex-shrink-0">
                                        匯出檔案
                                    </button>
                                )}
                                {mode === 'normal' && (loginRole === 'admin' || loginRole === 'office' || (loginRole === 'user' && isWeekArranged)) && (
                                    <button onClick={handleGeneratePDF} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-[#800000] bg-red-100 border-red-300 hover:bg-red-200 whitespace-nowrap flex-shrink-0">
                                        總表PDF
                                    </button>
                                )}
                                {mode === 'normal' && loginRole === 'admin' && (
                                    <>
                                    <button onClick={handlePrintListFormat} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-indigo-700 bg-indigo-100 border-indigo-300 hover:bg-indigo-200 whitespace-nowrap flex-shrink-0">
                                        列印檔案
                                    </button>
                                    <button onClick={calculateTAStatistics} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-yellow-800 bg-[#fff5cc] border-yellow-300 hover:bg-[#ffed99] whitespace-nowrap flex-shrink-0">
                                        數據統計
                                    </button>
                                    </>
                                )}
                                {mode === 'office' && (loginRole === 'admin' || loginRole === 'office') && (
                                    <>
                                    <button onClick={handleExportOfficeExcel} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-blue-700 bg-blue-100 border-blue-300 hover:bg-blue-200 whitespace-nowrap flex-shrink-0">
                                        匯出檔案
                                    </button>
                                    <button onClick={handleGenerateOfficePDF} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-[#800000] bg-red-100 border-red-300 hover:bg-red-200 whitespace-nowrap flex-shrink-0">
                                        職工PDF
                                    </button>
                                    <button onClick={handlePrintOfficeFormat} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-indigo-700 bg-indigo-100 border-indigo-300 hover:bg-indigo-200 whitespace-nowrap flex-shrink-0">
                                        列印檔案
                                    </button>
                                    <button onClick={calculateWorkerStatistics} className="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 rounded transition-colors border-2 text-yellow-800 bg-[#fff5cc] border-yellow-300 hover:bg-[#ffed99] whitespace-nowrap flex-shrink-0">
                                        數據統計
                                    </button>
                                    </>
                                )}
                            </div>
                            
                            <div className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full overflow-x-auto pb-1 sm:pb-0 scrollbar-hide print-hide border-t border-gray-200 pt-2 mt-1">
                                <span className="text-gray-600 mr-1 sm:mr-2 font-bold whitespace-nowrap flex-shrink-0">半日上課：</span>
                                {weekDates.map(wd => {
                                    const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);
                                    const isDisabled = mode !== 'normal' || !isAdmin; 
                                    return (
                                        <label key={wd.dateStr} className={`flex items-center px-2 py-1 rounded-md transition-colors mr-1 sm:mr-2 ${isHalfDay ? 'bg-orange-100 border border-orange-300 text-orange-800' : 'bg-gray-50 border border-gray-200 text-gray-700'} ${isDisabled ? 'cursor-not-allowed opacity-60' : 'cursor-pointer hover:bg-orange-50'}`}>
                                            <input
                                                type="checkbox"
                                                className={`mr-1.5 w-3.5 h-3.5 sm:w-4 sm:h-4 text-orange-500 rounded focus:ring-orange-500 ${isDisabled ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                                                checked={isHalfDay}
                                                disabled={isDisabled}
                                                onChange={() => handleHalfDayToggle(currentMondayStr, wd.dateStr, isHalfDay)}
                                            />
                                            <span className="whitespace-nowrap">{wd.name}</span>
                                        </label>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <div className="print-overflow-visible overflow-x-auto">
                        <table className="w-full border-collapse border border-black schedule-table text-sm table-fixed min-w-[1000px] md:min-w-[1200px] xl:min-w-[1400px]">
                        <thead>
                            <tr>
                            <th className="border border-black p-1 sm:p-1.5 lg:p-2 bg-blue-100 text-center w-[76px] sm:w-[80px] md:w-[115px] lg:w-[90px] min-w-[76px] sm:min-w-[80px] md:min-w-[115px] lg:min-w-[90px] max-w-[76px] sm:max-w-[80px] md:max-w-[115px] lg:max-w-[90px] shadow-sm align-middle tablet-landscape-time-col mobile-landscape-time-col">
                                <div className="text-[11px] sm:text-[13px] lg:text-[15px] font-extrabold text-blue-900 leading-tight whitespace-nowrap tracking-tighter">節數/時間</div>
                            </th>
                            {weekDates.map(wd => {
                                const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);
                                return (
                                <th key={wd.name} className={`border border-black p-1 sm:p-2 text-center align-middle w-auto min-w-[160px] sm:min-w-[190px] lg:min-w-[210px] ${isHalfDay ? 'bg-orange-200 text-orange-900' : 'bg-blue-100 text-blue-900'}`}>
                                <div className="flex flex-col justify-center items-center w-full">
                                    <div className="w-full font-extrabold text-[13px] sm:text-lg text-center">
                                        {wd.display}
                                        {isHalfDay && <span className="text-red-600 ml-1 text-[11px] sm:text-[14px]">(半日)</span>}
                                    </div>
                                    <div className="w-full font-bold text-[12px] sm:text-base text-center">{wd.name}</div>
                                </div>
                                </th>
                                );
                            })}
                            </tr>
                        </thead>
                        <tbody>
                            {PERIODS.map(period => {
                            if (period.isBreak) {
                                const isBlackBold = ['小息', '小休', '午膳', '午息'].includes(period.name);
                                return (
                                <tr key={period.id} className="bg-gray-50">
                                    <td className={`border border-black p-1 sm:p-2 text-center ${isBlackBold ? 'text-black font-extrabold text-base sm:text-lg lg:text-xl' : 'text-gray-700 font-bold text-sm sm:text-base lg:text-lg'}`} colSpan={6}>
                                    {period.name} ({period.time})
                                    </td>
                                </tr>
                                );
                            }

                            let periodNameClass = "font-extrabold mb-1 sm:mb-1.5 text-gray-900 whitespace-nowrap transition-all text-[15px] sm:text-[17px] lg:text-[19px]";
                            let periodTimeClass = "font-bold tracking-tighter whitespace-nowrap leading-none text-gray-800 transition-all text-[10px] sm:text-[12px] lg:text-[13px]";

                            return (
                                <tr key={period.id}>
                                <td className="border border-black p-1 sm:p-1.5 bg-gray-200 text-center align-middle w-[76px] sm:w-[80px] md:w-[115px] lg:w-[90px] min-w-[76px] sm:min-w-[80px] md:min-w-[115px] lg:min-w-[90px] max-w-[76px] sm:max-w-[80px] md:max-w-[115px] lg:max-w-[90px] tablet-landscape-time-col mobile-landscape-time-col">
                                    <div className={periodNameClass}>{period.name}</div>
                                    <div className={periodTimeClass}>
                                        <span>{period.time}</span>
                                    </div>
                                </td>
                                {weekDates.map(wd => {
                                    const cellBookings = bookings.filter(b =>
                                    (b.isSystem && b.day === wd.name && b.period === period.id) ||
                                    (b.isRecurring && b.day === wd.name && b.period === period.id) ||
                                    (!b.isSystem && !b.isRecurring && b.date === wd.dateStr && b.period === period.id)
                                    );

                                    const dateSuffix = wd.dateStr.substring(5);
                                    const blackoutReason = parsedHolidays[wd.dateStr] || BLACKOUT_DATES[dateSuffix];
                                    const isDateBlackout = Boolean(blackoutReason);
                                    const isSystemBlackout = cellBookings.some(b => b.isSystem);
                                    const visibleNonSystemBookings = cellBookings.filter(b => !b.isSystem && visibleCarts.includes(b.cart));

                                    if (isDateBlackout || (isSystemBlackout && !isAdmin && visibleNonSystemBookings.length === 0)) {
                                    const remark = blackoutReason || cellBookings.find(b => b.isSystem).remark;
                                    return (
                                        <td key={`${wd.name}-${period.id}`} className="border border-black p-1 sm:p-2 align-middle text-center bg-[#f5f5dc]">
                                        <span className="text-black font-extrabold text-[18px] sm:text-[22px] lg:text-[26px] print:text-[15px]">{remark}</span>
                                        </td>
                                    );
                                    }

                                    const isOnlySystemRemark = isSystemBlackout && visibleNonSystemBookings.length === 0;
                                    const isHalfDay = checkIsHalfDay(currentMondayStr, wd.dateStr);

                                    return (
                                    <td
                                        key={`${wd.name}-${period.id}`}
                                        className={`border border-black p-1 sm:p-2 transition-colors ${isOnlySystemRemark ? 'align-middle text-center' : 'align-top'} ${isSystemBlackout ? 'bg-[#f5f5dc]' : (isHalfDay ? 'bg-orange-50' : '')}`}
                                        onDragOver={(e) => { if (isAdmin || !isSystemBlackout) e.preventDefault(); }}
                                        onDrop={(e) => handleDrop(e, wd.dateStr, period.id, wd.name)}
                                    >
                                        {isOnlySystemRemark ? (
                                            <div className={`flex items-center justify-center w-full h-full min-h-[65px] ${isAdmin ? 'border-2 border-transparent hover:border-dashed hover:border-gray-400 rounded transition-all' : ''}`}>
                                                <span className="font-extrabold text-[18px] sm:text-[22px] lg:text-[26px] print:text-[15px] text-black">{cellBookings.find(b => b.isSystem).remark}</span>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col h-full space-y-1">
                                                {['1號車', '2號車', '3號車'].map((cartLabel) => {
                                                    if (!visibleCarts.includes(cartLabel)) return null;

                                                    const booking = cellBookings.find(b => b.cart === cartLabel && !b.isSystem);
                                                    if (!booking) {
                                                        if (isSystemBlackout) return null;
                                                        return (
                                                            <div key={`${cartLabel}-empty`} className="w-full rounded-lg border-2 border-dashed border-gray-200 flex items-center justify-center h-[75px] sm:h-[86px] mb-1 text-transparent select-none overflow-hidden">
                                                                {cartLabel}
                                                            </div>
                                                        );
                                                    }
                                                    return renderSimplifiedScheduleCard(booking, wd.dateStr);
                                                })}
                                            </div>
                                        )}
                                    </td>
                                    );
                                })}
                                </tr>
                            );
                            })}
                        </tbody>
                        <tfoot className="hidden print:table-footer-group">
                            <tr>
                                <td colSpan={weekDates.length + 1} className="h-[15mm] border-none bg-transparent"></td>
                            </tr>
                        </tfoot>
                        </table>
                    </div>
                </div>
                </div>
                );
            };

            const renderStatisticsModal = () => {
                if (!statisticsModal.show) return null;
                const isTA = statisticsModal.type === 'ta';
                const targetList = isTA ? TAS.filter(ta => ta !== '科任老師') : WORKERS;
                const titleText = isTA ? 'TA當值數據統計' : '職工當值數據統計';
                const colText = isTA ? 'TA代號' : '職工代號';

                const formattedStartDate = (() => {
                    const activeStartDate = isTA ? taStatsStartDate : workerStatsStartDate;
                    const d = new Date(activeStartDate);
                    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
                })();

                return (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4 print-hide">
                    <div className="bg-white rounded-xl shadow-lg w-full max-w-sm overflow-hidden border border-gray-200">
                        <div className="bg-[#fff5cc] p-4 border-b border-yellow-200 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-yellow-900 flex items-center">
                                <List className="mr-2" size={20} /> {titleText}
                            </h3>
                            <button onClick={() => setStatisticsModal({ show: false, data: null, endDateStr: '', type: 'worker' })} className="text-yellow-700 hover:text-yellow-900 font-extrabold text-xl">✕</button>
                        </div>
                        <div className="p-5 text-sm text-gray-800">
                            <div className="mb-4 font-bold text-center text-gray-700 bg-gray-50 py-3 rounded-lg border border-gray-100 shadow-inner">
                                <div className="text-base text-blue-900 mb-1">截至「{statisticsModal.endDateStr}」的統計數據</div>
                                <div className="text-xs font-medium text-gray-500">(自 {formattedStartDate} 起算，連堂安排計作一次)</div>
                            </div>
                            
                            <div className="bg-white rounded-lg px-2">
                                <div className="flex justify-between border-b-2 border-gray-300 pb-2 mb-2 font-bold text-gray-700 px-2">
                                    <span>{colText}</span>
                                    <span>(累積次數)</span>
                                </div>
                                <ul className="space-y-0.5">
                                    {targetList.map((item, index) => (
                                        <li key={item} className="flex justify-between items-center border-b border-gray-100 last:border-0 py-2 px-2 hover:bg-gray-50 transition-colors">
                                            <span className="font-bold text-gray-700">({index + 1}) {item}</span>
                                            <span className="font-extrabold text-blue-700 text-base">{statisticsModal.data[item] || 0} 次</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                        <div className="p-4 bg-gray-50 border-t border-gray-100 flex justify-center space-x-3">
                            <button 
                                onClick={() => setResetStatsState({ step: 1, password: '', newDate: getLocalYYYYMMDD(new Date()) })}
                                className="px-6 py-2.5 bg-red-100 hover:bg-red-200 text-red-800 font-extrabold rounded-lg transition-colors flex-1 shadow-sm"
                            >
                                重新設定
                            </button>
                            <button 
                                onClick={() => setStatisticsModal({ show: false, data: null, endDateStr: '', type: 'worker' })} 
                                className="px-6 py-2.5 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-extrabold rounded-lg transition-colors flex-1 shadow-sm"
                            >
                                確定關閉
                            </button>
                        </div>
                    </div>
                </div>
                );
            };

            const renderResetStatsModal = () => {
                if (resetStatsState.step === 0) return null;

                if (resetStatsState.step === 1) {
                    return (
                        <div className="fixed inset-0 bg-black/50 z-[110] flex items-center justify-center p-4 print-hide">
                            <div className="bg-white rounded-xl shadow-lg w-full max-w-sm p-6 border border-gray-200">
                                <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center justify-center">
                                    <Lock className="mr-2 text-red-600" /> 權限驗證
                                </h3>
                                <p className="text-sm text-gray-600 mb-4 text-center">重新設定統計需要校務處密碼，請輸入密碼：</p>
                                <input
                                    type="password"
                                    value={resetStatsState.password}
                                    onChange={e => setResetStatsState({...resetStatsState, password: e.target.value})}
                                    className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4 text-center text-lg tracking-widest"
                                    placeholder="輸入密碼"
                                    autoFocus
                                    onKeyDown={e => {
                                        if (e.key === 'Enter') {
                                            const isValid = resetStatsState.password === 'Smr-2608' || stringToHex(resetStatsState.password) === '536d722d32353236' || stringToHex(resetStatsState.password) === '536d722d32363038';
                                            if (isValid) {
                                                setResetStatsState({...resetStatsState, step: 2});
                                            } else {
                                                showNotification('密碼錯誤！', 'error');
                                            }
                                        }
                                    }}
                                />
                                <div className="flex space-x-3">
                                    <button onClick={() => setResetStatsState({ step: 0, password: '', newDate: '' })} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                    <button onClick={() => {
                                        const isValid = resetStatsState.password === 'Smr-2608' || stringToHex(resetStatsState.password) === '536d722d32353236' || stringToHex(resetStatsState.password) === '536d722d32363038';
                                        if (isValid) {
                                            setResetStatsState({...resetStatsState, step: 2});
                                        } else {
                                            showNotification('密碼錯誤！', 'error');
                                        }
                                    }} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors">驗證</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (resetStatsState.step === 2) {
                    return (
                        <div className="fixed inset-0 bg-black/50 z-[110] flex items-center justify-center p-4 print-hide">
                            <div className="bg-white rounded-xl shadow-lg w-full max-w-sm p-6 border border-gray-200">
                                <h3 className="text-lg font-bold text-gray-900 mb-4 flex items-center justify-center">
                                    <AlertCircle className="mr-2 text-red-600" /> 重新設定統計起始日期
                                </h3>
                                <div className="bg-red-50 text-red-800 p-3 rounded-lg text-sm font-bold mb-4 border border-red-200">
                                    <span className="block">將重置所有記錄，並且要確認重置。</span>
                                    <span className="block mt-1">(先前的數據將不會納入新的統計中)</span>
                                </div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">揀選重新開始計算日期：</label>
                                <input
                                    type="date"
                                    value={resetStatsState.newDate}
                                    onChange={e => setResetStatsState({...resetStatsState, newDate: e.target.value})}
                                    className="w-full min-w-0 appearance-none max-w-full box-border px-2 py-3 sm:p-3 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none mb-4 text-center text-sm sm:text-base bg-white"
                                />
                                <div className="flex space-x-3">
                                    <button onClick={() => setResetStatsState({ step: 0, password: '', newDate: '' })} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg transition-colors">取消</button>
                                    <button onClick={async () => {
                                        try {
                                            const ref = getDocRef('system_settings_calendar');
                                            const fieldToUpdate = statisticsModal.type === 'ta' ? 'taStatsStartDate' : 'workerStatsStartDate';
                                            await setDoc(ref, { [fieldToUpdate]: resetStatsState.newDate }, { merge: true });
                                            if (statisticsModal.type === 'ta') {
                                                setTaStatsStartDate(resetStatsState.newDate);
                                            } else {
                                                setWorkerStatsStartDate(resetStatsState.newDate);
                                            }
                                            setResetStatsState({ step: 0, password: '', newDate: '' });
                                            setStatisticsModal(prev => ({...prev, show: false}));
                                            showNotification('成功：統計起始日期已重置', 'success');
                                        } catch(e) {
                                            showNotification(`重置失敗: ${e.message}`, 'error');
                                        }
                                    }} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors">確認重置</button>
                                </div>
                            </div>
                        </div>
                    );
                }
                return null;
            };

            if (!loginRole) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-gray-100">
                            <div className="flex justify-center mb-6 text-blue-600">
                                <MonitorSmartphone size={48} />
                            </div>
                            <h2 className="text-2xl font-extrabold text-center text-gray-800 mb-6">
                                <span className="block">觀塘官立小學(秀明道)</span>
                                <span className="block mt-1">平板電腦借用系統</span>
                            </h2>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">請輸入登入密碼</label>
                                    <input
                                        type="password"
                                        value={loginPassword}
                                        onChange={e => setLoginPassword(e.target.value)}
                                        className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-center text-xl tracking-widest"
                                        autoFocus
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-md">
                                    登入系統
                                </button>
                            </form>
                        </div>
                        {notification.show && (
                            <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg flex items-center animate-bounce ${notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`}>
                                {notification.type === 'error' ? <AlertCircle className="mr-2" /> : <CheckCircle2 className="mr-2" />}
                                {notification.message}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-2 md:p-4 relative print:bg-white print:p-0">
                {renderDeleteModal()}
                {renderRearrangeModal()}
                {renderUnconfirmedModal()}
                {renderUnassignedPrintModal()}
                {renderUnlockModal()}
                {renderEditModal()}
                {renderAssignWorkerModal()}
                {renderHolidaysModal()}
                {renderHalfDaysModal()}
                {renderStatisticsModal()}
                {renderResetStatsModal()}
                <header className="w-full max-w-full mx-auto mb-4 md:mb-6 text-center relative pt-4 sm:pt-0 print-hide px-2">
                    <div className="absolute right-0 top-0 sm:right-2 sm:top-2 hidden sm:block">
